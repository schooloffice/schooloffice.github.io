<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ПЛЮС Вектор — векторний графічний редактор</title>
  <meta name="description" content="ПЛЮС Вектор — шкільний векторний графічний редактор у браузері без реєстрації.">
<link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="../UI_TOKENS.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../shell-overrides.css">
</head>

<body class="office-app" data-office-service="vector">
  <noscript>
    <p class="noscript-warning">Увімкніть JavaScript для роботи редактора.</p>
  </noscript>

  <div id="modalOverlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalText">
      <div id="modalIcon" class="modal-icon"></div>
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalText" class="modal-text"></div>
      <div id="modalInputWrap" class="modal-input-wrap hidden">
        <textarea id="modalInput" class="modal-input" rows="5"></textarea>
      </div>
      <div class="modal-actions">
        <button id="modalCancel" class="modal-btn secondary hidden">Скасувати</button>
        <button id="modalConfirm" class="modal-btn primary">Гаразд</button>
      </div>
    </div>
  </div>

  <input id="projectFileInput" type="file" accept=".json,application/json" hidden>

  <header class="app-header office-header">
    <div class="header-left">
      <a href="../" class="back-link" aria-label="Повернутися до Офіс ПЛЮС" title="Офіс ПЛЮС">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <div class="app-logo"><i class="fa-solid fa-bezier-curve"></i> ПЛЮС Вектор</div>
      <div class="file-name-wrap">
        <span id="dirtyDot" aria-hidden="true" title="Є незбережені зміни"></span>
        <span id="fileName" role="button" tabindex="0" title="Перейменувати файл">векторний_малюнок</span>
      </div>
    </div>
    <div class="header-right">
      <span id="saveBadge">Збережено ✓</span>
    </div>
  </header>

  <nav class="menubar office-menubar" aria-label="Головне меню">
    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="file" aria-haspopup="true" aria-expanded="false">Файл</button>
      <div class="menu-dropdown" data-menu="file" role="menu">
        <button class="menu-item" data-action="new-project"><span><i class="fa-solid fa-file-circle-plus fa-fw"></i>
            Новий проєкт</span><span class="shortcut">Ctrl+N</span></button>
        <button class="menu-item" data-action="open-project"><span><i class="fa-solid fa-folder-open fa-fw"></i>
            Відкрити проєкт</span><span class="shortcut">Ctrl+O</span></button>
        <button class="menu-item" data-action="save-project"><span><i class="fa-solid fa-floppy-disk fa-fw"></i>
            Зберегти проєкт</span><span class="shortcut">Ctrl+S</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="export-svg"><span><i class="fa-solid fa-file-code fa-fw"></i> Експорт
            SVG</span></button>
        <button class="menu-item" data-action="export-png"><span><i class="fa-solid fa-file-image fa-fw"></i> Експорт
            PNG</span><span class="shortcut">Ctrl+Shift+S</span></button>
        <button class="menu-item" data-action="print"><span><i class="fa-solid fa-print fa-fw"></i> Друк</span><span
            class="shortcut">Ctrl+P</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="edit" aria-haspopup="true" aria-expanded="false">Редагування</button>
      <div class="menu-dropdown" data-menu="edit" role="menu">
        <button class="menu-item" data-action="undo"><span><i class="fa-solid fa-rotate-left fa-fw"></i>
            Скасувати</span><span class="shortcut">Ctrl+Z</span></button>
        <button class="menu-item" data-action="redo"><span><i class="fa-solid fa-rotate-right fa-fw"></i>
            Повернути</span><span class="shortcut">Ctrl+Y</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="duplicate"><span><i class="fa-regular fa-clone fa-fw"></i>
            Дублювати</span><span class="shortcut">Ctrl+D</span></button>
        <button class="menu-item" data-action="delete-selected"><span><i class="fa-solid fa-trash fa-fw"></i> Видалити
            вибране</span><span class="shortcut">Delete</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="bring-front"><span><i class="fa-solid fa-layer-group fa-fw"></i> На
            передній план</span></button>
        <button class="menu-item" data-action="send-back"><span><i class="fa-solid fa-layer-group fa-fw"></i> На задній
            план</span></button>
        <button class="menu-item" data-action="edit-text"><span><i class="fa-solid fa-font fa-fw"></i> Змінити
            текст</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="insert" aria-haspopup="true" aria-expanded="false">Вставка</button>
      <div class="menu-dropdown" data-menu="insert" role="menu">
        <button class="menu-item" data-action="set-tool-text"><span><i class="fa-solid fa-font fa-fw"></i> Текст</span></button>
        <button class="menu-item" data-action="set-tool-rect"><span><i class="fa-regular fa-square fa-fw"></i> Прямокутник</span></button>
        <button class="menu-item" data-action="set-tool-ellipse"><span><i class="fa-regular fa-circle fa-fw"></i> Еліпс</span></button>
        <button class="menu-item" data-action="set-tool-line"><span><i class="fa-solid fa-minus fa-fw"></i> Лінія</span></button>
        <button class="menu-item" data-action="set-tool-arrow"><span><i class="fa-solid fa-arrow-right fa-fw"></i> Стрілка</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="format" aria-haspopup="true" aria-expanded="false">Формат</button>
      <div class="menu-dropdown" data-menu="format" role="menu">
        <button class="menu-item" data-action="bring-front"><span><i class="fa-solid fa-layer-group fa-fw"></i> На передній план</span></button>
        <button class="menu-item" data-action="send-back"><span><i class="fa-solid fa-layer-group fa-fw"></i> На задній план</span></button>
        <button class="menu-item" data-action="duplicate"><span><i class="fa-regular fa-clone fa-fw"></i> Дублювати</span><span class="shortcut">Ctrl+D</span></button>
        <button class="menu-item" data-action="edit-text"><span><i class="fa-solid fa-font fa-fw"></i> Змінити текст</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="view" aria-haspopup="true" aria-expanded="false">Перегляд</button>
      <div class="menu-dropdown" data-menu="view" role="menu">
        <button class="menu-item" data-action="guide-none"><span><i class="fa-regular fa-square fa-fw"></i> Підкладка:
            немає</span></button>
        <button class="menu-item" data-action="guide-grid"><span><i class="fa-solid fa-border-all fa-fw"></i> Підкладка:
            сітка</span></button>
        <button class="menu-item" data-action="guide-lines"><span><i class="fa-solid fa-grip-lines fa-fw"></i>
            Підкладка: рядки</span></button>
        <div class="menu-sep"></div>
        <button id="snapToggleBtn" class="menu-item" data-action="toggle-snap"><span><i class="fa-solid fa-magnet fa-fw"></i> Прив'язка до
            сітки</span><span id="snapStateLabel" class="shortcut">Увімкнено</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="zoom-out"><span><i class="fa-solid fa-magnifying-glass-minus fa-fw"></i>
            Масштаб −</span></button>
        <button class="menu-item" data-action="zoom-reset"><span><i class="fa-solid fa-expand fa-fw"></i> Масштаб
            100%</span></button>
        <button class="menu-item" data-action="zoom-in"><span><i class="fa-solid fa-magnifying-glass-plus fa-fw"></i>
            Масштаб +</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="help" aria-haspopup="true" aria-expanded="false">Допомога</button>
      <div class="menu-dropdown" data-menu="help" role="menu">
        <button class="menu-item" data-action="show-help"><span><i class="fa-solid fa-circle-question fa-fw"></i>
            Довідка та поради</span></button>
        <button class="menu-item" data-action="show-shortcuts"><span><i class="fa-solid fa-keyboard fa-fw"></i>
            Клавіатурні скорочення</span></button>
        <button class="menu-item" data-action="show-about"><span><i class="fa-solid fa-circle-info fa-fw"></i> Про ПЛЮС
            Вектор</span></button>
      </div>
    </div>
  </nav>

  <div class="toolbar office-toolbar" role="toolbar" aria-label="Панель інструментів">
    <div class="toolbar-row toolbar-row-top">
      <div class="toolbar-section toolbar-file-actions">
        <button class="tool-btn" data-action="new-project" data-office-command="new" title="Новий проєкт"><i
            class="fa-solid fa-file-circle-plus"></i></button>
        <button class="tool-btn" data-action="open-project" data-office-command="open" title="Відкрити проєкт"><i
            class="fa-solid fa-folder-open"></i></button>
        <button class="tool-btn" data-action="save-project" data-office-command="save" title="Зберегти проєкт"><i
            class="fa-solid fa-floppy-disk"></i></button>
        <button class="tool-btn" data-action="print" title="Друк"><i class="fa-solid fa-print"></i></button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-section toolbar-edit-actions">
        <button class="tool-btn" data-action="undo" data-office-command="undo" title="Скасувати"><i class="fa-solid fa-rotate-left"></i></button>
        <button class="tool-btn" data-action="redo" data-office-command="redo" title="Повернути"><i class="fa-solid fa-rotate-right"></i></button>
        <button class="tool-btn" data-action="duplicate" title="Дублювати"><i class="fa-regular fa-clone"></i></button>
        <button class="tool-btn danger" data-action="delete-selected" title="Видалити вибране"><i
            class="fa-solid fa-trash"></i></button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-section toolbar-context-actions">
        <div id="selectionState" class="selection-state is-empty">Нічого не вибрано</div>
        <button class="tool-btn" data-action="bring-front" title="На передній план"><i
            class="fa-solid fa-arrow-up-wide-short"></i></button>
        <button class="tool-btn" data-action="send-back" title="На задній план"><i
            class="fa-solid fa-arrow-down-short-wide"></i></button>
        <button class="tool-btn" data-action="edit-text" title="Змінити текст"><i
            class="fa-solid fa-pen-to-square"></i></button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-section toolbar-tool-actions">
        <button class="tool-switch active" data-tool="select" title="Вибір">
          <i class="fa-solid fa-arrow-pointer"></i>
          <span>Вибір</span>
        </button>

        <div class="tool-picker" data-picker="draw">
          <button id="drawGroupTrigger" class="tool-switch tool-group-trigger" type="button" aria-haspopup="true"
            aria-expanded="false" title="Лінії та малювання">
            <i id="drawGroupIcon" class="fa-solid fa-pencil"></i>
            <span id="drawGroupLabel">Олівець</span>
            <i class="fa-solid fa-chevron-down picker-caret"></i>
          </button>
          <div class="tool-picker-menu" data-picker-menu="draw">
            <button class="tool-menu-option" type="button" data-tool="pen"><i
                class="fa-solid fa-pencil"></i><span>Олівець</span></button>
            <button class="tool-menu-option" type="button" data-tool="line"><i
                class="fa-solid fa-minus"></i><span>Лінія</span></button>
            <button class="tool-menu-option" type="button" data-tool="arrow"><i
                class="fa-solid fa-arrow-right-long"></i><span>Стрілка</span></button>
          </div>
        </div>

        <div class="tool-picker" data-picker="shape">
          <button id="shapeGroupTrigger" class="tool-switch tool-group-trigger" type="button" aria-haspopup="true"
            aria-expanded="false" title="Фігури">
            <i id="shapeGroupIcon" class="fa-solid fa-star"></i>
            <span id="shapeGroupLabel">Зірка</span>
            <i class="fa-solid fa-chevron-down picker-caret"></i>
          </button>
          <div class="tool-picker-menu tool-picker-menu-grid" data-picker-menu="shape">
            <button class="tool-menu-option" type="button" data-tool="rect"><i
                class="fa-regular fa-square"></i><span>Прямокутник</span></button>
            <button class="tool-menu-option" type="button" data-tool="ellipse"><i
                class="fa-regular fa-circle"></i><span>Еліпс</span></button>
            <button class="tool-menu-option" type="button" data-tool="triangle"><i
                class="fa-solid fa-play fa-rotate-270"></i><span>Трикутник</span></button>
            <button class="tool-menu-option" type="button" data-tool="diamond"><i
                class="fa-regular fa-gem"></i><span>Ромб</span></button>
            <button class="tool-menu-option" type="button" data-tool="star"><i
                class="fa-solid fa-star"></i><span>Зірка</span></button>
          </div>
        </div>

        <button class="tool-switch" data-tool="text" title="Текст">
          <i class="fa-solid fa-font"></i>
          <span>Текст</span>
        </button>
      </div>

      <div class="toolbar-divider toolbar-divider-spacer"></div>

      <div class="toolbar-section toolbar-zoom-actions">
        <button class="tool-btn" type="button" data-action="zoom-out" title="Зменшити"><i
            class="fa-solid fa-minus"></i></button>
        <button id="zoomValueBtn" class="zoom-value" type="button" data-action="zoom-reset" title="100%">100%</button>
        <button class="tool-btn" type="button" data-action="zoom-in" title="Збільшити"><i
            class="fa-solid fa-plus"></i></button>
      </div>
    </div>

    <div class="toolbar-row toolbar-row-bottom">
      <div class="toolbar-section toolbar-color-actions">
        <span class="toolbar-label">Кольори</span>
        <button id="strokeTargetBtn" class="color-target active" type="button" title="Колір контуру">
          <span class="color-target-label">Контур</span>
          <span id="strokePreview" class="color-chip stroke-chip"></span>
        </button>
        <button id="fillTargetBtn" class="color-target" type="button" title="Колір заливки">
          <span class="color-target-label">Заливка</span>
          <span id="fillPreview" class="color-chip fill-chip"></span>
        </button>
        <div id="colorPalette" class="inline-palette" aria-label="Основна палітра кольорів"></div>
        <button id="noFillBtn" class="mini-btn" type="button" title="Без заливки"><i
            class="fa-solid fa-ban"></i></button>
        <label class="custom-color-btn" title="Власний колір">
          <i class="fa-solid fa-droplet"></i>
          <input id="nativeColorPicker" type="color" value="#1f2937" aria-label="Власний колір">
        </label>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-section toolbar-settings-actions">
        <label class="control-stack" title="Товщина контуру">
          <span>Контур</span>
          <input id="strokeWidthSlider" type="range" min="1" max="18" step="1" value="3">
        </label>
        <div id="strokeWidthValue" class="value-badge">3 px</div>

        <label class="control-stack" title="Непрозорість">
          <span>Прозорість</span>
          <input id="opacitySlider" type="range" min="10" max="100" step="5" value="100">
        </label>
        <div id="opacityValue" class="value-badge">100%</div>

        <label class="control-stack" title="Розмір шрифту">
          <span>Текст</span>
          <input id="fontSizeSlider" type="range" min="12" max="96" step="2" value="32">
        </label>
        <div id="fontSizeValue" class="value-badge">32 px</div>
      </div>
    </div>
  </div>

  <main class="workspace office-workspace office-workspace-focusable" tabindex="0">
    <section class="canvas-area">
      <div id="canvasScroller" class="canvas-scroller">
        <div id="artboardWrap" class="artboard-wrap">
          <svg id="drawingSvg" class="drawing-svg" xmlns="http://www.w3.org/2000/svg" width="1200" height="700"
            viewBox="0 0 1200 700" aria-label="Векторне полотно">
            <defs>
              <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"
                markerUnits="strokeWidth">
                <path d="M0,0 L12,6 L0,12 z" fill="currentColor"></path>
              </marker>
            </defs>
            <rect class="board-bg" x="0" y="0" width="1200" height="700" fill="#ffffff"></rect>
            <g id="guideLayer"></g>
            <g id="contentLayer"></g>
            <g id="selectionLayer"></g>
          </svg>
        </div>
      </div>
    </section>
  </main>

  <footer class="statusbar office-statusbar" aria-label="Рядок стану">
    <span id="statusCoords" data-office-status-slot="meta">X: 0, Y: 0</span>
    <span id="statusTool" data-office-status-slot="primary">Інструмент: Вибір</span>
    <span id="statusSelection" data-office-status-slot="secondary">Вибрано: нічого</span>
    <span id="statusStyle" data-office-status-slot="style">Контур: #1F2937 · Заливка: немає</span>
    <span id="statusZoom" data-office-status-slot="zoom">Масштаб: 100%</span>
    <span id="statusCanvas" data-office-status-slot="canvas">Полотно: 1200 × 700</span>
  </footer>

  <script src="js/constants.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/runtime.js"></script>
  <script src="../office-shell.js"></script>
  <script src="../office-ui.js"></script>
  <script src="../offline.js"></script>
</body>

</html>
