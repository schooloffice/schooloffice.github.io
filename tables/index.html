<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ПЛЮС Таблиці — Табличний редактор</title>
<link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css">
  <script src="../vendor/chartjs/chart.umd.js"></script>
  <link rel="stylesheet" href="../UI_TOKENS.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../shell-overrides.css">
</head>
<body class="office-app" data-office-service="tables">
  <header class="app-header office-header" role="banner">
    <div class="header-left">
      <a href="../" class="back-link" aria-label="Повернутися до Офіс ПЛЮС" title="Офіс ПЛЮС">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
      </a>
      <div class="app-logo"><i class="fa-solid fa-table-cells-large" aria-hidden="true"></i> ПЛЮС Таблиці</div>
      <div class="file-name-wrap">
        <span id="dirtyDot" aria-hidden="true" title="Є незбережені зміни"></span>
        <span id="fileName" role="button" tabindex="0" title="Клікни для перейменування">таблиця</span>
      </div>
    </div>
    <div class="header-right">
      <span id="saveBadge" aria-live="polite" aria-atomic="true">Збережено ✓</span>
    </div>
  </header>

  <nav class="menubar office-menubar" role="menubar" aria-label="Головне меню">
    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="file" role="menuitem" aria-haspopup="true" aria-expanded="false">Файл</button>
      <div class="menu-dropdown" data-menu="file" role="menu">
        <button class="menu-item" data-action="new"><span><i class="fa-solid fa-file-circle-plus fa-fw"></i> Нова таблиця</span><span class="shortcut">Ctrl+N</span></button>
        <button class="menu-item" data-action="open-workbook"><span><i class="fa-solid fa-folder-open fa-fw"></i> Відкрити .arttab</span></button>
        <button class="menu-item" data-action="save-workbook"><span><i class="fa-solid fa-floppy-disk fa-fw"></i> Зберегти .arttab</span><span class="shortcut">Ctrl+S</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="import-csv"><span><i class="fa-solid fa-file-import fa-fw"></i> Імпорт CSV</span></button>
        <button class="menu-item" data-action="export-csv"><span><i class="fa-solid fa-file-csv fa-fw"></i> Експорт CSV</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="print"><span><i class="fa-solid fa-print fa-fw"></i> Друк</span><span class="shortcut">Ctrl+P</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="edit" role="menuitem" aria-haspopup="true" aria-expanded="false">Редагування</button>
      <div class="menu-dropdown" data-menu="edit" role="menu">
        <button class="menu-item" data-action="undo" id="menuUndo"><span><i class="fa-solid fa-rotate-left fa-fw"></i> Скасувати</span><span class="shortcut">Ctrl+Z</span></button>
        <button class="menu-item" data-action="redo" id="menuRedo"><span><i class="fa-solid fa-rotate-right fa-fw"></i> Повернути</span><span class="shortcut">Ctrl+Y</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="copy"><span><i class="fa-regular fa-copy fa-fw"></i> Копіювати</span><span class="shortcut">Ctrl+C</span></button>
        <button class="menu-item" data-action="paste"><span><i class="fa-solid fa-paste fa-fw"></i> Вставити</span><span class="shortcut">Ctrl+V</span></button>
        <button class="menu-item" data-action="clear-selection"><span><i class="fa-solid fa-eraser fa-fw"></i> Очистити виділене</span><span class="shortcut">Del</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="insert" role="menuitem" aria-haspopup="true" aria-expanded="false">Вставка</button>
      <div class="menu-dropdown" data-menu="insert" role="menu">
        <button class="menu-item" data-action="insert-row-above"><span><i class="fa-solid fa-grip-lines fa-fw"></i> Рядок зверху</span></button>
        <button class="menu-item" data-action="insert-row-below"><span><i class="fa-solid fa-grip-lines fa-fw"></i> Рядок знизу</span></button>
        <button class="menu-item" data-action="insert-col-left"><span><i class="fa-solid fa-table-columns fa-fw"></i> Колонка ліворуч</span></button>
        <button class="menu-item" data-action="insert-col-right"><span><i class="fa-solid fa-table-columns fa-fw"></i> Колонка праворуч</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="delete-row"><span><i class="fa-solid fa-trash-can fa-fw"></i> Видалити рядок</span></button>
        <button class="menu-item" data-action="delete-col"><span><i class="fa-solid fa-trash-can fa-fw"></i> Видалити колонку</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="chart"><span><i class="fa-solid fa-chart-column fa-fw"></i> Побудувати діаграму</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="format" role="menuitem" aria-haspopup="true" aria-expanded="false">Формат</button>
      <div class="menu-dropdown" data-menu="format" role="menu">
        <button class="menu-item" data-action="style-bold"><span><i class="fa-solid fa-bold fa-fw"></i> Жирний</span></button>
        <button class="menu-item" data-action="style-italic"><span><i class="fa-solid fa-italic fa-fw"></i> Курсив</span></button>
        <button class="menu-item" data-action="style-underline"><span><i class="fa-solid fa-underline fa-fw"></i> Підкреслення</span></button>
        <button class="menu-item" data-action="style-strike"><span><i class="fa-solid fa-strikethrough fa-fw"></i> Закреслення</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="align-left"><span><i class="fa-solid fa-align-left fa-fw"></i> Ліворуч</span></button>
        <button class="menu-item" data-action="align-center"><span><i class="fa-solid fa-align-center fa-fw"></i> По центру</span></button>
        <button class="menu-item" data-action="align-right"><span><i class="fa-solid fa-align-right fa-fw"></i> Праворуч</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="toggle-border"><span><i class="fa-solid fa-border-all fa-fw"></i> Межі</span></button>
        <button class="menu-item" data-action="clear-fill"><span><i class="fa-solid fa-droplet-slash fa-fw"></i> Без заливки</span></button>
        <button class="menu-item" data-action="clear-text-color"><span><i class="fa-solid fa-font fa-fw"></i> Стандартний колір тексту</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="data" role="menuitem" aria-haspopup="true" aria-expanded="false">Дані</button>
      <div class="menu-dropdown" data-menu="data" role="menu">
        <button class="menu-item" data-action="func-sum"><span><i class="fa-solid fa-sigma fa-fw"></i> СУМА</span></button>
        <button class="menu-item" data-action="func-avg"><span><i class="fa-solid fa-calculator fa-fw"></i> СЕРЕДНЄ</span></button>
        <button class="menu-item" data-action="func-max"><span><i class="fa-solid fa-arrow-up-9-1 fa-fw"></i> МАКС</span></button>
        <button class="menu-item" data-action="func-min"><span><i class="fa-solid fa-arrow-down-1-9 fa-fw"></i> МІН</span></button>
        <button class="menu-item" data-action="func-count"><span><i class="fa-solid fa-hashtag fa-fw"></i> COUNT</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="sort-asc"><span><i class="fa-solid fa-arrow-down-a-z fa-fw"></i> Сортувати A→Я / 1→9</span></button>
        <button class="menu-item" data-action="sort-desc"><span><i class="fa-solid fa-arrow-down-z-a fa-fw"></i> Сортувати Я→A / 9→1</span></button>
        <button class="menu-item" data-action="autofit"><span><i class="fa-solid fa-arrows-left-right-to-line fa-fw"></i> Автоширина</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="view" role="menuitem" aria-haspopup="true" aria-expanded="false">Перегляд</button>
      <div class="menu-dropdown" data-menu="view" role="menu">
        <button class="menu-item" data-action="zoom-90">90%</button>
        <button class="menu-item checked" data-action="zoom-100">100%</button>
        <button class="menu-item" data-action="zoom-115">115%</button>
        <button class="menu-item" data-action="zoom-130">130%</button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="help" role="menuitem" aria-haspopup="true" aria-expanded="false">Допомога</button>
      <div class="menu-dropdown" data-menu="help" role="menu">
        <button class="menu-item" data-action="example"><span><i class="fa-solid fa-lightbulb fa-fw"></i> Завантажити приклад</span></button>
        <button class="menu-item" data-action="shortcuts"><span><i class="fa-solid fa-keyboard fa-fw"></i> Клавіатурні скорочення</span></button>
        <button class="menu-item" data-action="about"><span><i class="fa-solid fa-circle-info fa-fw"></i> Про ПЛЮС Таблиці</span></button>
      </div>
    </div>
  </nav>

  <div class="toolbar office-toolbar" role="toolbar" aria-label="Інструменти таблиці">
    <div class="tb-group compact-group office-toolbar-group">
      <button class="tb-btn" data-action="new" data-office-command="new" title="Нова таблиця"><i class="fa-solid fa-file-circle-plus"></i></button>
      <button class="tb-btn" data-action="open-workbook" data-office-command="open" title="Відкрити"><i class="fa-solid fa-folder-open"></i></button>
      <button class="tb-btn" data-action="save-workbook" data-office-command="save" title="Зберегти"><i class="fa-solid fa-floppy-disk"></i></button>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group compact-group">
      <button class="tb-btn" data-action="undo" data-office-command="undo" title="Скасувати"><i class="fa-solid fa-rotate-left"></i></button>
      <button class="tb-btn" data-action="redo" data-office-command="redo" title="Повернути"><i class="fa-solid fa-rotate-right"></i></button>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group compact-group">
      <button class="tb-btn" data-action="style-bold" title="Жирний"><i class="fa-solid fa-bold"></i></button>
      <button class="tb-btn" data-action="style-italic" title="Курсив"><i class="fa-solid fa-italic"></i></button>
      <button class="tb-btn" data-action="style-underline" title="Підкреслення"><i class="fa-solid fa-underline"></i></button>
      <button class="tb-btn" data-action="style-strike" title="Закреслення"><i class="fa-solid fa-strikethrough"></i></button>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group compact-group">
      <button class="tb-btn" data-action="align-left" title="Ліворуч"><i class="fa-solid fa-align-left"></i></button>
      <button class="tb-btn" data-action="align-center" title="По центру"><i class="fa-solid fa-align-center"></i></button>
      <button class="tb-btn" data-action="align-right" title="Праворуч"><i class="fa-solid fa-align-right"></i></button>
      <button class="tb-btn" data-action="toggle-border" title="Межі"><i class="fa-solid fa-border-all"></i></button>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group palette-wrap">
      <button class="tb-btn palette-toggle" data-palette="text" aria-expanded="false" title="Колір тексту"><i class="fa-solid fa-font"></i></button>
      <div class="palette-popover" id="textPalette" hidden>
        <div class="palette-actions">
          <button id="textNoColor" class="palette-action">Стандартний</button>
        </div>
        <div class="palette-grid" id="textSwatches"></div>
      </div>
    </div>

    <div class="tb-group palette-wrap">
      <button class="tb-btn palette-toggle" data-palette="fill" aria-expanded="false" title="Колір заливки"><i class="fa-solid fa-fill-drip"></i></button>
      <div class="palette-popover" id="fillPalette" hidden>
        <div class="palette-actions">
          <button id="fillNoColor" class="palette-action">Без кольору</button>
        </div>
        <div class="palette-grid" id="fillSwatches"></div>
      </div>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <select id="numberFormatSelect" class="tb-select" aria-label="Формат числа">
        <option value="">Звичайний формат</option>
        <option value="style-num-int">Ціле число</option>
        <option value="style-num-fixed2">2 знаки після коми</option>
        <option value="style-num-percent">Відсотки</option>
        <option value="style-num-currency-uah">Гривні ₴</option>
      </select>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group formula-group">
      <button class="tb-chip" data-action="func-sum">СУМА</button>
      <button class="tb-chip" data-action="func-avg">СЕР</button>
      <button class="tb-chip" data-action="func-max">МАКС</button>
      <button class="tb-chip" data-action="func-min">МІН</button>
      <button class="tb-chip" data-action="func-count">COUNT</button>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group compact-group push-right">
      <button class="tb-btn accent" data-action="sort-asc" title="Сортувати за першою колонкою"><i class="fa-solid fa-arrow-down-a-z"></i></button>
      <button class="tb-btn accent" data-action="sort-desc" title="Сортувати у зворотному порядку"><i class="fa-solid fa-arrow-down-z-a"></i></button>
      <button class="tb-btn accent" data-action="autofit" title="Автоширина колонок"><i class="fa-solid fa-arrows-left-right-to-line"></i></button>
      <button class="tb-btn accent" data-action="chart" title="Діаграма"><i class="fa-solid fa-chart-pie"></i></button>
    </div>
  </div>

  <div class="formula-bar-wrap">
    <div class="name-box" id="activeCellRef">A1</div>
    <label class="fx-label" for="formulaBar">fx</label>
    <input id="formulaBar" type="text" placeholder="Введіть число або формулу, наприклад: =SUM(A1:A5) або =ROUND(B2/3,2)" maxlength="200">
  </div>

  <main class="workspace office-workspace office-workspace-focusable" tabindex="0">
    <section class="sheet-shell">
      <div id="gridWrap" class="sheet-scroll" aria-label="Робоча область таблиці">
        <button id="insertColBtn" class="insert-btn hidden" title="Вставити колонку"><i class="fa-solid fa-plus"></i></button>
        <button id="insertRowBtn" class="insert-btn hidden" title="Вставити рядок"><i class="fa-solid fa-plus"></i></button>

        <table id="grid">
          <colgroup id="colgroup"></colgroup>
          <thead>
            <tr id="headRow"><th class="row-header">#</th></tr>
          </thead>
          <tbody id="bodyRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="statusbar office-statusbar" aria-label="Рядок стану">
    <div id="selectionInfo" data-office-status-slot="primary">Виділення: A1</div>
    <div id="statsInfo" data-office-status-slot="secondary">Кількість: 0 · Сума: 0 · Середнє: 0</div>
    <div class="status-right" data-office-status-slot="meta">
      <button class="status-btn" data-action="zoom-90">−</button>
      <span id="zoomLabel">100%</span>
      <button class="status-btn" data-action="zoom-115">+</button>
    </div>
  </footer>

  <input id="csvFileInput" type="file" accept=".csv,text/csv" class="hidden">
  <input id="workbookFileInput" type="file" accept=".arttab,.json,application/json" class="hidden">

  <div id="msgModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-icon"><i class="fa-solid fa-circle-info"></i></div>
      <h3 id="msgTitle" class="modal-title">Інформація</h3>
      <p id="msgText" class="modal-text"></p>
      <button data-close-modal="msgModal" class="modal-primary-btn">Гаразд</button>
    </div>
  </div>

  <div id="confirmModal" class="modal-overlay">
    <div class="modal-content">
      <h3 class="modal-title">Підтвердження</h3>
      <p id="confirmText" class="modal-text"></p>
      <div class="modal-actions">
        <button data-close-modal="confirmModal" class="modal-secondary-btn">Скасувати</button>
        <button id="confirmBtnYes" class="modal-primary-btn">Продовжити</button>
      </div>
    </div>
  </div>

  <div id="chartModal" class="modal-overlay">
    <div class="choffice-modal-content">
      <div class="choffice-toolbar">
        <div class="chart-type-group">
          <button data-chart-type="bar" class="chart-type-btn">Стовпчики</button>
          <button data-chart-type="line" class="chart-type-btn">Лінія</button>
          <button data-chart-type="pie" class="chart-type-btn">Кругова</button>
        </div>
        <button data-close-modal="chartModal" class="chart-close-btn"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="chart-canvas-wrap"><canvas id="theChart"></canvas></div>
    </div>
  </div>

  <div id="ariaAnnouncer" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <div id="rowHeaderMenu" class="header-context-menu hidden">
    <button class="menu-item" data-action="insert-row-above"><span><i class="fa-solid fa-grip-lines fa-fw"></i> Вставити рядок зверху</span></button>
    <button class="menu-item" data-action="insert-row-below"><span><i class="fa-solid fa-grip-lines fa-fw"></i> Вставити рядок знизу</span></button>
    <div class="menu-sep"></div>
    <button class="menu-item danger" data-action="delete-row"><span><i class="fa-solid fa-trash-can fa-fw"></i> Видалити рядок</span></button>
  </div>

  <div id="colHeaderMenu" class="header-context-menu hidden">
    <button class="menu-item" data-action="insert-col-left"><span><i class="fa-solid fa-table-columns fa-fw"></i> Вставити колонку ліворуч</span></button>
    <button class="menu-item" data-action="insert-col-right"><span><i class="fa-solid fa-table-columns fa-fw"></i> Вставити колонку праворуч</span></button>
    <div class="menu-sep"></div>
    <button class="menu-item danger" data-action="delete-col"><span><i class="fa-solid fa-trash-can fa-fw"></i> Видалити колонку</span></button>
  </div>

  <script src="js/addressing.js"></script>
  <script src="js/model.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/formula-parser.js"></script>
  <script src="js/formula-references.js"></script>
  <script src="js/formula-functions.js"></script>
  <script src="js/formula-engine.js"></script>
  <script src="js/core.js"></script>
  <script src="js/state.js"></script>
  <script src="js/column-sizing.js"></script>
  <script src="js/formula-bar.js"></script>
  <script src="js/grid.js"></script>
  <script src="js/clipboard.js"></script>
  <script src="js/selection-actions.js"></script>
  <script src="js/formatting.js"></script>
  <script src="js/structure.js"></script>
  <script src="js/workbook.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/sorting.js"></script>
  <script src="js/workbook-file.js"></script>
  <script src="js/view-options.js"></script>
  <script src="js/cell-format-ui.js"></script>
  <script src="js/calculation.js"></script>
  <script src="js/app.js"></script>
  <script src="js/runtime.js"></script>
  <script src="../office-shell.js"></script>
  <script src="../office-ui.js"></script>
  <script src="../offline.js"></script>
</body>
</html>
