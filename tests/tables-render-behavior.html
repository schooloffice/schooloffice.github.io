<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tables Render Behavior</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; color: #162033; }
    iframe { width: 960px; height: 540px; border: 1px solid #d6dce5; border-radius: 8px; }
    pre { white-space: pre-wrap; padding: 16px; border: 1px solid #d6dce5; border-radius: 8px; background: #f8fafc; }
    .pass { color: #15803d; }
    .fail { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Tables Render Behavior</h1>
  <pre id="result">Running...</pre>
  <iframe id="tablesFrame" src="../tables/"></iframe>

  <script>
    const result = document.getElementById('result');
    const frame = document.getElementById('tablesFrame');

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function run() {
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error('tables iframe load timed out')), 7000);
        frame.addEventListener('load', () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
      });

      await wait(500);

      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      const headers = doc.querySelectorAll('#headRow th.col-header');
      const rows = doc.querySelectorAll('#bodyRows tr');
      const cells = doc.querySelectorAll('#bodyRows td[data-id]');
      const activeCell = doc.getElementById('activeCellRef')?.textContent?.trim();

      const checks = [
        ['TablesApp boot exported', typeof win.TablesApp?.boot === 'function'],
        ['default columns rendered', headers.length >= 30],
        ['default rows rendered', rows.length >= 60],
        ['default cells rendered', cells.length >= 1800],
        ['active cell visible', activeCell === 'A1']
      ];

      // ---- Autofill drag wiring (end-to-end через реальний grid) ----
      const fire = (el, type, opts) =>
        el.dispatchEvent(new win.MouseEvent(type, Object.assign({ bubbles: true, button: 0 }, opts)));
      const setCell = (id, val) => {
        const inp = doc.getElementById('inp_' + id);
        inp.value = val;
        inp.dispatchEvent(new win.Event('input', { bubbles: true }));
      };

      setCell('A1', '1');
      setCell('A2', '2');

      // Виділити A1:A2
      fire(doc.querySelector('td[data-id="A1"]'), 'mousedown');
      fire(doc.querySelector('td[data-id="A2"]'), 'mouseenter');
      fire(doc, 'mouseup');

      const handle = doc.querySelector('.fill-handle');
      const handleVisible = !!handle && handle.style.display === 'block';

      // Перетягнути маркер до A5
      if (handle) {
        fire(handle, 'mousedown');
        fire(doc.querySelector('td[data-id="A5"]'), 'mouseenter');
        fire(doc, 'mouseup');
      }
      await wait(50);

      checks.push(['fill handle appears for selection', handleVisible]);
      checks.push(['autofill drag fills A3', doc.getElementById('inp_A3')?.value === '3']);
      checks.push(['autofill drag fills A4', doc.getElementById('inp_A4')?.value === '4']);
      checks.push(['autofill drag fills A5', doc.getElementById('inp_A5')?.value === '5']);

      // ---- Вирівнювання за типом даних (Хвиля 1.4) ----
      setCell('F1', '42');
      setCell('G1', 'привіт');
      win.TablesCalculation.recalculateAll();
      const tdF1 = doc.querySelector('td[data-id="F1"]');
      const tdG1 = doc.querySelector('td[data-id="G1"]');
      const alignOf = id => win.getComputedStyle(doc.getElementById('inp_' + id)).textAlign;
      checks.push(['number cell typed', tdF1.classList.contains('cell-type-number')]);
      checks.push(['text cell typed', tdG1.classList.contains('cell-type-text')]);
      checks.push(['number aligns right by default', alignOf('F1') === 'right']);
      checks.push(['text aligns left by default', alignOf('G1') === 'left']);
      tdF1.classList.add('style-align-left');
      checks.push(['explicit align overrides type', alignOf('F1') === 'left']);

      // ---- Умовне форматування (Хвиля 2.2) ----
      const CF = win.TablesConditionalFormatting;
      checks.push(['cond matches helper (lt)', CF.condRuleMatches({ op: 'lt', v1: 4 }, 2) === true]);
      checks.push(['cond rejects helper (lt)', CF.condRuleMatches({ op: 'lt', v1: 4 }, 9) === false]);
      checks.push(['cond between helper', CF.condRuleMatches({ op: 'between', v1: 4, v2: 6 }, 5) === true]);

      setCell('H1', '2');
      setCell('H2', '9');
      CF.addRule({ range: [7, 1, 7, 2], op: 'lt', v1: 4, v2: null, fill: '#fee2e2' });
      win.TablesCalculation.recalculateAll();
      const bgOf = id => win.getComputedStyle(doc.querySelector('td[data-id="' + id + '"]')).backgroundColor;
      checks.push(['cond fill applies to H1 (<4)', bgOf('H1') === 'rgb(254, 226, 226)']);
      checks.push(['cond fill skips H2 (>=4)', bgOf('H2') !== 'rgb(254, 226, 226)']);
      CF.clearCondRules();

      // Повний UI-потік: вибір клітинки → модалка → кнопка «Додати правило»
      fire(doc.querySelector('td[data-id="H3"]'), 'mousedown');
      fire(doc, 'mouseup');
      setCell('H3', '1');
      CF.openCondFormatModal();
      doc.getElementById('condOp').value = 'lt';
      doc.getElementById('condV1').value = '4';
      doc.getElementById('condAddBtn').click();
      win.TablesCalculation.recalculateAll();
      checks.push(['cond modal add-button applies', bgOf('H3') === 'rgb(254, 226, 226)']);
      checks.push(['cond rule listed', !!doc.querySelector('#condRuleList .cond-rule-item')]);
      CF.clearCondRules();

      // ---- Фільтр за стовпцем (Хвиля 2.3) ----
      const FL = win.TablesFilter;
      checks.push(['filter matches gt', FL.filterMatches({ op: 'gt', v1: 5 }, '10') === true]);
      checks.push(['filter contains text', FL.filterMatches({ op: 'contains', v1: 'ан' }, 'Іванов') === true]);
      checks.push(['filter excludes empty', FL.filterMatches({ op: 'gt', v1: 0 }, '') === false]);

      setCell('J1', '3'); setCell('J2', '8'); setCell('J3', '1'); setCell('J4', '=4+5');
      fire(doc.querySelector('td[data-id="J1"]'), 'mousedown');
      fire(doc, 'mouseup');
      FL.openFilterModal();
      doc.getElementById('filterOp').value = 'ge';
      doc.getElementById('filterV1').value = '5';
      doc.getElementById('filterApplyBtn').click();
      const trDisplay = id => doc.querySelector('td[data-id="' + id + '"]').closest('tr').style.display;
      checks.push(['filter hides J1 (3<5)', trDisplay('J1') === 'none']);
      checks.push(['filter shows J2 (8>=5)', trDisplay('J2') === '']);
      checks.push(['filter hides J3 (1<5)', trDisplay('J3') === 'none']);
      checks.push(['filter matches formula result J4 (=9)', trDisplay('J4') === '']);
      FL.clearRowFilter();
      checks.push(['clear filter shows J1 again', trDisplay('J1') === '']);

      // Структурне видалення рядка → #REF! у залежній формулі (end-to-end)
      setCell('K1', '7');
      setCell('K5', '=K1');
      win.TablesStructure.deleteRow(1);
      checks.push(['delete row yields #REF! in dependent formula', doc.getElementById('inp_K4')?.value === '#REF!']);

      // ---- Кілька аркушів (Хвиля 3.1) ----
      const SH = win.TablesSheets;
      const tabCount = () => doc.querySelectorAll('#sheetTabs .sheet-tab').length;
      const inpVal = id => doc.getElementById('inp_' + id)?.value;

      checks.push(['one sheet initially', tabCount() === 1]);
      const sheet1A1 = inpVal('A1');

      SH.addSheet();
      checks.push(['second sheet added', tabCount() === 2]);
      checks.push(['new sheet has empty A1', inpVal('A1') === '']);

      setCell('A1', 'S2');
      SH.switchToSheet(0);
      checks.push(['sheet1 keeps its A1 after switch', inpVal('A1') === sheet1A1]);
      SH.switchToSheet(1);
      checks.push(['sheet2 retains its own A1', inpVal('A1') === 'S2']);

      SH.renameSheet(1, 'Журнал');
      checks.push(['sheet renamed', doc.querySelectorAll('#sheetTabs .sheet-tab')[1].textContent === 'Журнал']);

      SH.deleteSheet(1);
      doc.getElementById('confirmBtnYes').click();
      checks.push(['sheet deleted via confirm', tabCount() === 1]);

      const failures = checks.filter(([, ok]) => !ok).map(([name]) => name);
      result.className = failures.length ? 'fail' : 'pass';
      result.textContent = checks.map(([name, ok]) => `${ok ? 'PASS' : 'FAIL'} ${name}`).join('\n') +
        `\n\n${failures.length ? 'FAILED' : 'PASSED'}`;
      document.body.dataset.tablesRender = failures.length ? 'failed' : 'passed';
    }

    run().catch(error => {
      result.className = 'fail';
      result.textContent = String(error && error.stack || error);
      document.body.dataset.tablesRender = 'failed';
    });
  </script>
</body>
</html>
