<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tables Formula Behavior</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; color: #162033; }
    pre { white-space: pre-wrap; padding: 16px; border: 1px solid #d6dce5; border-radius: 8px; background: #f8fafc; }
    .pass { color: #15803d; }
    .fail { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Tables Formula Behavior</h1>
  <pre id="result">Running...</pre>

  <script src="../tables/js/addressing.js"></script>
  <script src="../tables/js/model.js"></script>
  <script src="../tables/js/storage.js"></script>
  <script src="../tables/js/formula-parser.js"></script>
  <script src="../tables/js/formula-references.js"></script>
  <script src="../tables/js/formula-functions.js"></script>
  <script src="../tables/js/formula-engine.js"></script>
  <script src="../tables/js/core.js"></script>
  <script src="../tables/js/state.js"></script>
  <script src="../tables/js/formula-bar.js"></script>
  <script src="../tables/js/grid.js"></script>
  <script src="../tables/js/clipboard.js"></script>
  <script src="../tables/js/cell-format-ui.js"></script>
  <script>
    const result = document.getElementById('result');

    function assertEqual(name, actual, expected) {
      if (Object.is(actual, expected)) return `PASS ${name}`;
      throw new Error(`${name}: expected ${expected}, got ${actual}`);
    }

    function assertThrows(name, fn, expectedMessage) {
      try {
        fn();
      } catch (e) {
        return assertEqual(name, e && e.message, expectedMessage);
      }
      throw new Error(`${name}: expected throw ${expectedMessage}, but nothing was thrown`);
    }

    try {
      localStorage.clear();
      setGridSize(20, 10);
      selStart = { c: 0, r: 1 };
      selEnd = { c: 1, r: 2 };
      cellData = {
        A1: '10',
        A2: '20',
        A3: '30',
        B1: '5',
        B2: '=A1+B1',
        C1: '—В–µ–Ї—Б—В'
      };

      const checks = [
        assertEqual('SUM range', evaluateFormula('SUM(A1:A3)'), 60),
        assertEqual('AVERAGE range', evaluateFormula('AVERAGE(A1:A3)'), 20),
        assertEqual('AVG alias still works', evaluateFormula('AVG(A1:A3)'), 20),
        assertEqual('COUNT range', evaluateFormula('COUNT(A1:C1)'), 2),
        assertEqual('COUNTA range', evaluateFormula('COUNTA(A1:C1)'), 3),
        assertEqual('IF comparison true', evaluateFormula('IF(A1>=10,1,0)'), 1),
        assertEqual('IF comparison false', evaluateFormula('IF(A1>10,1,0)'), 0),
        assertEqual('AND comparison', evaluateFormula('AND(A1=10,B1<10)'), 1),
        assertEqual('OR comparison', evaluateFormula('OR(A1=5,B1=5)'), 1),
        assertEqual('NOT comparison', evaluateFormula('NOT(A1=5)'), 1),
        assertEqual('MOD', evaluateFormula('MOD(A3,20)'), 10),
        assertEqual('INT', evaluateFormula('INT(12.9)'), 12),
        assertEqual('CEILING', evaluateFormula('CEILING(12.1)'), 13),
        assertEqual('percent literal', evaluateFormula('200*15%'), 30),
        assertEqual('cell formula reference', evaluateFormula('B2*2'), 30),
        // AST-—А—Г—И—Ц–є: –Љ–Њ–ґ–ї–Є–≤–Њ—Б—В—Ц, –љ–µ–і–Њ—Б—В—Г–њ–љ—Ц —Б—В–∞—А–Њ–Љ—Г —А–µ–≥–µ–Ї—Б–њ-–і–≤–Є–≥—Г–љ—Г
        assertEqual('absolute reference', evaluateFormula('$A$1+$B$1'), 15),
        assertEqual('mixed reference', evaluateFormula('A$1+$B1'), 15),
        assertEqual('nested same-name function', evaluateFormula('MAX(MAX(A1:A3),5)'), 30),
        assertEqual('nested round+average', evaluateFormula('ROUND(AVERAGE(A1:A3),0)'), 20),
        assertEqual('range plus scalar arg', evaluateFormula('SUM(A1:A3,B1)'), 65),
        assertEqual('text cell result', evaluateFormula('C1'), '—В–µ–Ї—Б—В'),
        assertEqual('string equality in IF', evaluateFormula('IF(C1="—В–µ–Ї—Б—В",1,0)'), 1),
        assertEqual('lazy IF skips error branch', evaluateFormula('IF(B1=5,42,100/0)'), 42),
        assertEqual('AVERAGE ignores text', evaluateFormula('AVERAGE(A1:C1)'), 7.5),
        // Wave 2.1: —Г–Љ–Њ–≤–љ—Ц —Д—Г–љ–Ї—Ж—Ц—Ч
        assertEqual('COUNTIF greater', evaluateFormula('COUNTIF(A1:A3,">15")'), 2),
        assertEqual('COUNTIF exact', evaluateFormula('COUNTIF(A1:A3,10)'), 1),
        assertEqual('SUMIF range', evaluateFormula('SUMIF(A1:A3,">=10")'), 60),
        assertEqual('AVERAGEIF range', evaluateFormula('AVERAGEIF(A1:A3,">=20")'), 25),
        // shiftFormulaRefs: —В–µ–њ–µ—А —З–µ—А–µ–Ј —В–Њ–Ї–µ–љ–∞–є–Ј–µ—А, –њ–Њ–≤–∞–ґ–∞—Ф $ —Ц —А—П–і–Ї–Є
        // –°—В—А—Г–Ї—В—Г—А–љ–Є–є –Ј—Б—Г–≤ (–≤—Б—В–∞–≤–Ї–∞/–≤–Є–і–∞–ї–µ–љ–љ—П —А—П–і–Ї—Ц–≤): –∞–±—Б–Њ–ї—О—В–љ—Ц —В–µ–ґ –Ј—Б—Г–≤–∞—О—В—М—Б—П
        assertEqual('shift relative refs', shiftFormulaRefs('=A1+B2', { rowAt: 1, rowDelta: 1, local: true }), '=A2+B3'),
        assertEqual('shift adjusts absolute on insert', shiftFormulaRefs('=$A$1+B2', { rowAt: 1, rowDelta: 1, local: true }), '=$A$2+B3'),
        assertEqual('shift mixed refs', shiftFormulaRefs('=A$1+$A1', { rowAt: 1, rowDelta: 1, local: true }), '=A$2+$A2'),
        assertEqual('shift columns', shiftFormulaRefs('=A1+B1', { colAt: 0, colDelta: 1, local: true }), '=B1+C1'),
        assertEqual('shift adjusts absolute column', shiftFormulaRefs('=$A1+B1', { colAt: 0, colDelta: 1, local: true }), '=$B1+C1'),
        assertEqual('shift range', shiftFormulaRefs('=SUM(A1:A3)', { rowAt: 1, rowDelta: 1, local: true }), '=SUM(A2:A4)'),
        assertEqual('shift skips string literal', shiftFormulaRefs('=IF(A1="A1",1,0)', { rowAt: 1, rowDelta: 1, local: true }), '=IF(A2="A1",1,0)'),
        // –Т–Є–і–∞–ї–µ–љ–љ—П —А—П–і–Ї—Ц–≤ вЖТ #REF! –і–ї—П –≤–Є–і–∞–ї–µ–љ–Є—Е –Ї–ї—Ц—В–Є–љ–Њ–Ї
        assertEqual('delete row makes #REF!', shiftFormulaRefs('=A1+A5', { rowAt: 1, rowDelta: -1, local: true }), '=#REF!+A4'),
        assertEqual('delete inside range shrinks it', shiftFormulaRefs('=SUM(A1:A5)', { rowAt: 3, rowDelta: -1, local: true }), '=SUM(A1:A4)'),
        assertEqual('delete whole range вЖТ #REF!', shiftFormulaRefs('=SUM(A1:A3)', { rowAt: 1, rowDelta: -3, local: true }), '=SUM(#REF!)'),
        assertEqual('rename sheet refs', renameSheetRefs('=–Р—А–Ї—Г—И2!A1+B1', '–Р—А–Ї—Г—И2', '–Ц—Г—А–љ–∞–ї'), '=–Ц—Г—А–љ–∞–ї!A1+B1'),
        // F4 reference cycling: A1 вЖТ $A$1 вЖТ A$1 вЖТ $A1 вЖТ A1
        assertEqual('F4 relвЖТabs', TablesFormulaBar.computeReferenceCycle('=A1', 3).value, '=$A$1'),
        assertEqual('F4 absвЖТrowabs', TablesFormulaBar.computeReferenceCycle('=$A$1', 5).value, '=A$1'),
        assertEqual('F4 rowabsвЖТcolabs', TablesFormulaBar.computeReferenceCycle('=A$1', 4).value, '=$A1'),
        assertEqual('F4 colabsвЖТrel', TablesFormulaBar.computeReferenceCycle('=$A1', 4).value, '=A1'),
        assertEqual('F4 targets ref at caret', TablesFormulaBar.computeReferenceCycle('=A1+B2', 2).value, '=$A$1+B2'),
        assertEqual('F4 ignores non-formula', TablesFormulaBar.computeReferenceCycle('A1', 2), null),
        // offsetFormulaRefs: –Ј—Б—Г–≤ —Г—Б—Ц—Е –≤—Ц–і–љ–Њ—Б–љ–Є—Е –њ–Њ—Б–Є–ї–∞–љ—М –љ–∞ –і–µ–ї—М—В—Г (–і–ї—П –Ї–Њ–њ—Ц—О–≤–∞–љ–љ—П)
        assertEqual('offset shifts relative', offsetFormulaRefs('=A1+$B$2', 2, 1), '=B3+$B$2'),
        assertEqual('offset keeps absolute row', offsetFormulaRefs('=A$1', 2, 1), '=B$1'),
        assertEqual('offset clamps to bounds', offsetFormulaRefs('=A1', -5, -5), '=A1'),
        assertEqual('offset preserves cross-sheet', offsetFormulaRefs('=–Р—А–Ї—Г—И2!A1+B1', 1, 0), '=–Р—А–Ї—Г—И2!A2+B2'),
        assertEqual('structure skips other-sheet ref', shiftFormulaRefs('=–Р—А–Ї—Г—И2!A1+B1', { rowAt: 1, rowDelta: 1, sheet: '–Р—А–Ї—Г—И1', local: true }), '=–Р—А–Ї—Г—И2!A1+B2'),
        assertEqual('structure shifts ref to modified sheet', shiftFormulaRefs('=–Р—А–Ї—Г—И2!A1', { rowAt: 1, rowDelta: 1, sheet: '–Р—А–Ї—Г—И2', local: false }), '=–Р—А–Ї—Г—И2!A2'),
        // computeFillRaw: —З–Є—Б–ї–Њ–≤—Ц —Б–µ—А—Ц—Ч —В–∞ –њ–Њ–≤—В–Њ—А –Ј—А–∞–Ј–Ї–∞
        assertEqual('fill series step 1', computeFillRaw(['1', '2'], 2).raw, '3'),
        assertEqual('fill series continues', computeFillRaw(['1', '2'], 4).raw, '5'),
        assertEqual('fill single number copies', computeFillRaw(['5'], 3).raw, '5'),
        assertEqual('fill series step 2', computeFillRaw(['2', '4'], 2).raw, '6'),
        assertEqual('fill text repeats', computeFillRaw(['–Я–љ'], 2).raw, '–Я–љ'),
        assertEqual('fill formula is pattern', computeFillRaw(['=A1'], 1).type, 'pattern'),
        assertEqual('clipboard TSV serialization', TablesClipboard.serializeSelectionToTsv(), '10\t5\n20\t=A1+B1')
      ];

      TablesClipboard.applyTsvToGridData('7\t8\n9\t10', 4, 4);
      checks.push(assertEqual('clipboard paste top-left', cellData.E4, '7'));
      checks.push(assertEqual('clipboard paste bottom-right', cellData.F5, '10'));

      // Wave 1.2: –≤–љ—Г—В—А—Ц—И–љ—Ф –Ї–Њ–њ—Ц—О–≤–∞–љ–љ—П –Ј–±–µ—А—Ц–≥–∞—Ф —Д–Њ—А–Љ—Г–ї–Є —Ц –Ј—Б—Г–≤–∞—Ф –≤—Ц–і–љ–Њ—Б–љ—Ц –њ–Њ—Б–Є–ї–∞–љ–љ—П
      cellData = { A1: '10', A2: '20', C1: '=A1+5', C2: '=$A$1+A2' };
      selStart = { c: 2, r: 1 };
      selEnd = { c: 2, r: 2 }; // C1:C2
      TablesClipboard.copySelectionToClipboard();
      const copiedFormulas = TablesClipboard.serializeSelectionToTsv();
      checks.push(assertEqual('internal paste detected', TablesClipboard.isInternalPaste(copiedFormulas), true));
      TablesClipboard.applyTsvToGridData(copiedFormulas, 3, 3); // –≤—Б—В–∞–≤–Ї–∞ –≤–µ—А—Е–љ—Ц–Љ-–ї—Ц–≤–Є–Љ —Г D3
      checks.push(assertEqual('copy shifts relative ref', cellData.D3, '=B3+5'));
      checks.push(assertEqual('copy keeps absolute ref', cellData.D4, '=$A$1+B4'));

      // Wave 1.3: –∞–≤—В–Њ–Ј–∞–њ–Њ–≤–љ–µ–љ–љ—П (—Б–µ—А—Ц—Ч, —Д–Њ—А–Љ—Г–ї–Є, –≤–≥–Њ—А—Г)
      cellData = { A1: '1', A2: '2' };
      applyAutoFill({ cMin: 0, cMax: 0, rMin: 1, rMax: 2 }, { cMin: 0, cMax: 0, rMin: 1, rMax: 5 });
      checks.push(assertEqual('autofill numeric series A3', cellData.A3, '3'));
      checks.push(assertEqual('autofill numeric series A5', cellData.A5, '5'));

      cellData = { D1: '=A1*2' };
      applyAutoFill({ cMin: 3, cMax: 3, rMin: 1, rMax: 1 }, { cMin: 3, cMax: 3, rMin: 1, rMax: 3 });
      checks.push(assertEqual('autofill formula down D2', cellData.D2, '=A2*2'));
      checks.push(assertEqual('autofill formula down D3', cellData.D3, '=A3*2'));

      cellData = { A5: '=A4' };
      applyAutoFill({ cMin: 0, cMax: 0, rMin: 5, rMax: 5 }, { cMin: 0, cMax: 2, rMin: 5, rMax: 5 });
      checks.push(assertEqual('autofill formula right B5', cellData.B5, '=B4'));
      checks.push(assertEqual('autofill formula right C5', cellData.C5, '=C4'));

      cellData = { A8: '3', A9: '4' };
      applyAutoFill({ cMin: 0, cMax: 0, rMin: 8, rMax: 9 }, { cMin: 0, cMax: 0, rMin: 6, rMax: 9 });
      checks.push(assertEqual('autofill up series A7', cellData.A7, '2'));
      checks.push(assertEqual('autofill up series A6', cellData.A6, '1'));

      // Wave 2.1: SUMIF/COUNTIF –Ј —В–µ–Ї—Б—В–Њ–≤–Є–Љ –Ї—А–Є—В–µ—А—Ц—Ф–Љ —Ц –Њ–Ї—А–µ–Љ–Є–Љ sum_range
      cellData = { A1: '–Ж–≤–∞–љ–Њ–≤', A2: '–Я–µ—В—А–Њ–≤', A3: '–Ж–≤–∞–љ–Њ–≤', B1: '10', B2: '20', B3: '30' };
      checks.push(assertEqual('COUNTIF text criterion', evaluateFormula('COUNTIF(A1:A3,"–Ж–≤–∞–љ–Њ–≤")'), 2));
      checks.push(assertEqual('SUMIF with sum_range', evaluateFormula('SUMIF(A1:A3,"–Ж–≤–∞–љ–Њ–≤",B1:B3)'), 40));
      checks.push(assertEqual('AVERAGEIF with avg_range', evaluateFormula('AVERAGEIF(A1:A3,"–Ж–≤–∞–љ–Њ–≤",B1:B3)'), 20));

      // Wave 2.4: –і–∞—В–Є (—Б–µ—А—Ц–є–љ—Ц –љ–Њ–Љ–µ—А–Є + —Д–Њ—А–Љ–∞—В)
      checks.push(assertEqual('DATE round-trip', serialToDateString(ymdToSerial(2026, 6, 6), false), '06.06.2026'));
      checks.push(assertEqual('DATE plus days', serialToDateString(ymdToSerial(2026, 6, 6) + 7, false), '13.06.2026'));
      checks.push(assertEqual('DATE function returns serial', evaluateFormula('DATE(2026,6,6)'), ymdToSerial(2026, 6, 6)));
      checks.push(assertEqual('date difference in days', evaluateFormula('DATE(2026,6,13)-DATE(2026,6,6)'), 7));
      checks.push(assertEqual('TODAY returns serial', evaluateFormula('TODAY()'), todaySerial()));
      const dateTd = document.createElement('td');
      dateTd.classList.add('style-num-date');
      checks.push(assertEqual('date number format display', formatDisplayValue(ymdToSerial(2026, 6, 6), dateTd), '06.06.2026'));

      // Wave 3.2: –Љ—Ц–ґ–∞—А–Ї—Г—И–µ–≤—Ц –њ–Њ—Б–Є–ї–∞–љ–љ—П
      cellData = { A1: '10', B1: '5' };
      sheets = [
        { name: '–Р—А–Ї—Г—И1', cellData: cellData, cellStyles: {}, colWidths: {}, condRules: [], rows: ROWS, cols: COL_COUNT },
        { name: '–Р—А–Ї—Г—И2', cellData: { A1: '100', A2: '200', A3: '=A1+A2', A100: '42' }, cellStyles: {}, colWidths: {}, condRules: [], rows: 100, cols: COL_COUNT }
      ];
      activeSheet = 0;
      checks.push(assertEqual('cross-sheet ref', evaluateFormula('–Р—А–Ї—Г—И2!A1'), 100));
      checks.push(assertEqual('cross-sheet range sum', evaluateFormula('SUM(–Р—А–Ї—Г—И2!A1:A2)'), 300));
      checks.push(assertEqual('cross-sheet formula cell', evaluateFormula('–Р—А–Ї—Г—И2!A3'), 300));
      checks.push(assertEqual('mix active and cross-sheet', evaluateFormula('A1+–Р—А–Ї—Г—И2!A1'), 110));
      checks.push(assertEqual('cross-sheet beyond active size', evaluateFormula('–Р—А–Ї—Г—И2!A100'), 42));
      checks.push(assertThrows('unknown sheet вЖТ #REF!', () => evaluateFormula('–Э–µ–Љ–∞–Ґ–∞–Ї–Њ–≥–Њ!A1'), '#REF!'));
      checks.push(assertThrows('#REF! literal evaluates', () => evaluateFormula('#REF!'), '#REF!'));
      sheets[1].name = '–Ь—Ц–є –∞—А–Ї—Г—И';
      checks.push(assertEqual('quoted sheet name', evaluateFormula("'–Ь—Ц–є –∞—А–Ї—Г—И'!A2"), 200));

      // Selection stats must ignore empty cells (Number('') === 0 regression)
      cellData = { A1: '10', A2: '20', A3: '30', B1: '-5', B3: '-2' };
      selStart = { c: 0, r: 0 };
      selEnd = { c: 0, r: 4 }; // A1:A5, with A4 and A5 empty
      const statsA = getSelectionStats();
      checks.push(assertEqual('stats count ignores empty', statsA.count, 3));
      checks.push(assertEqual('stats countNumbers ignores empty', statsA.countNumbers, 3));
      checks.push(assertEqual('stats sum', statsA.sum, 60));
      checks.push(assertEqual('stats min ignores empty', statsA.min, 10));
      checks.push(assertEqual('stats max', statsA.max, 30));
      checks.push(assertEqual('stats avg', statsA.avg, 20));

      selStart = { c: 1, r: 0 };
      selEnd = { c: 1, r: 4 }; // B1:B5, negatives with empty B2/B4/B5
      const statsB = getSelectionStats();
      checks.push(assertEqual('stats max not zeroed by empty', statsB.max, -2));
      checks.push(assertEqual('stats min negative', statsB.min, -5));
      checks.push(assertEqual('stats countNumbers negatives', statsB.countNumbers, 2));

      // Standard formula error codes (Excel/Sheets-—Б—Г–Љ—Ц—Б–љ—Ц)
      cellData = { A1: '10', E1: '=E1' };
      checks.push(assertThrows('error #DIV/0!', () => evaluateFormula('1/0'), '#DIV/0!'));
      checks.push(assertThrows('error #DIV/0! via MOD', () => evaluateFormula('MOD(5,0)'), '#DIV/0!'));
      checks.push(assertThrows('error #NAME?', () => evaluateFormula('FOO(1)'), '#NAME?'));
      checks.push(assertThrows('error #NUM! sqrt', () => evaluateFormula('SQRT(-1)'), '#NUM!'));
      checks.push(assertThrows('error #CIRC!', () => evaluateFormula('E1'), '#CIRC!'));

      result.className = 'pass';
      result.textContent = checks.join('\n') + '\n\nPASSED';
      document.body.dataset.tablesFormula = 'passed';
    } catch (error) {
      result.className = 'fail';
      result.textContent = String(error && error.stack || error);
      document.body.dataset.tablesFormula = 'failed';
    }
  </script>
</body>
</html>
