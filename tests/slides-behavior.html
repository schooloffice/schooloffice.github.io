<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slides Behavior</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; color: #162033; }
    iframe { width: 960px; height: 540px; border: 1px solid #d6dce5; border-radius: 8px; }
    pre { white-space: pre-wrap; padding: 16px; border: 1px solid #d6dce5; border-radius: 8px; background: #f8fafc; }
    .pass { color: #15803d; }
    .fail { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Slides Behavior</h1>
  <pre id="result">Running...</pre>
  <iframe id="slidesFrame"></iframe>

  <script type="module">
    import { normalizePresentation, parsePresentationText, slugify } from '../slides/js/project.js';
    import { LIMITS, SCHEMA_VERSION } from '../slides/js/constants.js';
    import { chooseNewerDraftRecord, loadDraft, saveDraft, clearDraft } from '../slides/js/storage.js';
    import { elementBounds } from '../slides/js/stage-interactions.js';

    const result = document.getElementById('result');
    const frame = document.getElementById('slidesFrame');

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function waitFor(predicate, label, timeout = 5000) {
      const start = performance.now();
      while (performance.now() - start < timeout) {
        if (predicate()) return;
        await wait(100);
      }
      throw new Error(label);
    }

    function check(name, ok) {
      if (!ok) throw new Error(name);
      return `PASS ${name}`;
    }

    function loadFrame(url) {
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error('slides iframe load timed out')), 7000);
        frame.addEventListener('load', () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
        frame.src = url;
      });
    }

    async function run() {
      await import('../slides/js/app.js');
      check('Slides app module import', typeof window.SlidesApp?.boot === 'function');

      // Storage-перевірки ДО запуску застосунку в iframe (немає гонки з
      // autosave). Залишаємо сховище чистим для детермінованого старту.
      let idbRoundTrips = false;
      let clearDraftWorks = false;
      let imageDraftRoundTrips = false;
      let quotaFailurePropagates = false;
      let storageRecoversAfterFailure = false;
      let wrappedDraftLoads = false;
      let legacyDraftLoads = false;
      let clearWritesTombstone = false;
      let equalTimestampTombstoneWins = false;
      try {
        await clearDraft();
        await saveDraft({ probe: 'idb-roundtrip' });
        const back = await loadDraft();
        idbRoundTrips = !!back && back.probe === 'idb-roundtrip';

        await clearDraft();
        clearDraftWorks = (await loadDraft()) === null;

        // Багатомегабайтний data-URL доводить, що реалістична презентація з
        // великим зображенням зберігається й відновлюється через IndexedDB.
        const imageDraft = { schemaVersion: SCHEMA_VERSION, fileName: 'З фото', slides: [{ id: 's1', background: '#ffffff', elements: [{ type: 'image', content: 'data:image/png;base64,' + 'A'.repeat(3 * 1024 * 1024), x: 0, y: 0, w: 100, h: 100 }] }], currentSlideId: 's1' };
        await saveDraft(imageDraft);
        const imageBack = await loadDraft();
        imageDraftRoundTrips = !!imageBack && imageBack.slides?.[0]?.elements?.[0]?.content === imageDraft.slides[0].elements[0].content;
        await clearDraft();

        // При однаковому timestamp tombstone повинен перемогти живу чернетку.
        const tieSavedAt = 123456789;
        const chosenTie = chooseNewerDraftRecord(
          { savedAt: tieSavedAt, payload: { probe: 'stale-idb' } },
          { savedAt: tieSavedAt, payload: null }
        );
        equalTimestampTombstoneWins = chosenTie?.payload === null;

        // Детерміновано імітуємо quota failure, не заповнюючи диск. Помилка
        // повинна повернутися викликачеві, а наступне збереження — працювати.
        const putDescriptor = Object.getOwnPropertyDescriptor(IDBObjectStore.prototype, 'put');
        const setItemDescriptor = Object.getOwnPropertyDescriptor(Storage.prototype, 'setItem');
        try {
          Object.defineProperty(IDBObjectStore.prototype, 'put', {
            ...putDescriptor,
            value() { throw new DOMException('Quota exceeded in test', 'QuotaExceededError'); }
          });
          Object.defineProperty(Storage.prototype, 'setItem', {
            ...setItemDescriptor,
            value() { throw new DOMException('Quota exceeded in test', 'QuotaExceededError'); }
          });
          await saveDraft({ probe: 'quota-failure' });
        } catch (error) {
          quotaFailurePropagates = error?.name === 'QuotaExceededError';
        } finally {
          Object.defineProperty(IDBObjectStore.prototype, 'put', putDescriptor);
          Object.defineProperty(Storage.prototype, 'setItem', setItemDescriptor);
        }
        await saveDraft({ probe: 'after-quota-failure' });
        storageRecoversAfterFailure = (await loadDraft())?.probe === 'after-quota-failure';
        await clearDraft();

        // Формат запису: новий загорнутий {savedAt,payload} і legacy незагорнута
        // чернетка обидва коректно читаються (реконсиляція/зворотна сумісність).
        localStorage.setItem('art_slides_v1', JSON.stringify({ savedAt: 5, payload: { probe: 'wrapped' } }));
        wrappedDraftLoads = (await loadDraft())?.probe === 'wrapped';
        await clearDraft();
        localStorage.setItem('art_slides_v1', JSON.stringify({ probe: 'legacy', slides: [] }));
        legacyDraftLoads = (await loadDraft())?.probe === 'legacy';
        await clearDraft();

        // Очищення, коли IDB прибрати не вдалося, лишає tombstone (payload=null),
        // що приховує стару IDB-чернетку після reload; clearDraft звітує чесно.
        await saveDraft({ probe: 'to-clear' });
        const clearedReturn = await clearDraft();
        const afterClear = await loadDraft();
        const lsRaw = localStorage.getItem('art_slides_v1');
        const lsRec = lsRaw ? JSON.parse(lsRaw) : null;
        clearWritesTombstone = clearedReturn === true && afterClear === null && !!lsRec && lsRec.payload === null && typeof lsRec.savedAt === 'number';
      } catch {}

      await loadFrame('../slides/index.html');

      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      await waitFor(() => typeof win.SlidesApp?.boot === 'function', 'SlidesApp boot exported');
      await waitFor(() => doc.querySelectorAll('#slideList .slide-card').length >= 1, 'slide list rendered');
      await waitFor(() => doc.querySelectorAll('#stage .stage-element').length >= 1, 'stage elements rendered');
      const project = {
        fileName: 'Шкільна презентація',
        slides: [{
          id: 's1',
          background: '#ffffff',
          elements: [{
            id: 't1',
            type: 'text',
            x: 120,
            y: 120,
            w: 320,
            h: 90,
            content: 'Тема',
            style: { fontSize: 32 }
          }]
        }],
        currentSlideId: 's1'
      };
      const normalized = normalizePresentation(project);
      const parsed = parsePresentationText(JSON.stringify(project));

      const checks = [
        check('SlidesApp boot exported', typeof win.SlidesApp?.boot === 'function'),
        check('slide list rendered', doc.querySelectorAll('#slideList .slide-card').length >= 1),
        check('stage rendered', !!doc.querySelector('#stage')),
        check('stage elements rendered', doc.querySelectorAll('#stage .stage-element').length >= 1),
        check('standard commands exported', ['new', 'open', 'save', 'undo', 'redo'].every(command => !!doc.querySelector(`[data-office-command="${command}"]`))),
        check('project normalize keeps file name', normalized?.fileName === 'Шкільна презентація'),
        check('project normalize keeps elements', normalized?.slides?.[0]?.elements?.length === 1),
        check('project parse works', parsed?.slides?.[0]?.id === 's1'),
        check('slugify handles ukrainian', slugify('Моя презентація 1') === 'моя-презентація-1'),
        check('elementBounds axis-aligned for rotation 0', (() => {
          const b = elementBounds({ x: 100, y: 100, w: 240, h: 160, rotation: 0 });
          return b.left === 100 && b.right === 340 && b.top === 100 && b.bottom === 260;
        })()),
        check('elementBounds rotation-aware (90deg AABB)', (() => {
          const b = elementBounds({ x: 100, y: 100, w: 240, h: 160, rotation: 90 });
          return Math.abs(b.left - 140) < 0.001 && Math.abs(b.right - 300) < 0.001 && Math.abs(b.top - 60) < 0.001 && Math.abs(b.bottom - 300) < 0.001;
        })()),
        check('IndexedDB draft round-trips', idbRoundTrips),
        check('clear-draft removes the draft', clearDraftWorks),
        check('large image draft (data-url) round-trips', imageDraftRoundTrips),
        check('quota failure propagates without breaking the editor', quotaFailurePropagates),
        check('draft storage recovers after quota failure', storageRecoversAfterFailure),
        check('wrapped draft record loads', wrappedDraftLoads),
        check('legacy unwrapped draft still loads', legacyDraftLoads),
        check('clear-draft leaves a tombstone (no resurrection)', clearWritesTombstone),
        check('equal-timestamp tombstone wins over stale IDB draft', equalTimestampTombstoneWins)
      ];

      // Негативні/безпекові перевірки нормалізації імпорту (P0): ліміти, нейтралізація
      // зовнішніх URL, кламбінг координат, відмова на пошкодженому/надмірному файлі.
      const slidesOf = els => ({ slides: [{ id: 's', background: '#fff', elements: els }] });
      const firstEl = data => normalizePresentation(data).slides[0].elements[0];
      checks.push(check('import rejects non-object', normalizePresentation(null) === null && normalizePresentation(7) === null));
      checks.push(check('import rejects empty slides', normalizePresentation({ slides: [] }) === null));
      checks.push(check('import rejects too many slides', normalizePresentation({ slides: Array.from({ length: LIMITS.MAX_SLIDES + 1 }, (_, i) => ({ id: 's' + i, elements: [] })) }) === null));
      checks.push(check('import rejects too many elements', normalizePresentation(slidesOf(Array.from({ length: LIMITS.MAX_ELEMENTS_PER_SLIDE + 1 }, () => ({ type: 'text', content: 'a' })))) === null));
      checks.push(check('import neutralizes external image url', firstEl(slidesOf([{ type: 'image', content: 'https://evil.example/x.png' }])).content === ''));
      checks.push(check('import keeps data image url', firstEl(slidesOf([{ type: 'image', content: 'data:image/png;base64,AAAA' }])).content === 'data:image/png;base64,AAAA'));
      checks.push(check('import preserves image alt text', firstEl(slidesOf([{ type: 'image', content: 'data:image/png;base64,AAAA', alt: 'Кругообіг води' }])).alt === 'Кругообіг води'));
      checks.push(check('import keeps valid font family', firstEl(slidesOf([{ type: 'text', content: 'a', style: { fontFamily: 'serif' } }])).style.fontFamily === 'serif'));
      checks.push(check('import allowlists unknown font family', firstEl(slidesOf([{ type: 'text', content: 'a', style: { fontFamily: 'evil-font' } }])).style.fontFamily === 'sans'));
      checks.push(check('import keeps valid line height preset', firstEl(slidesOf([{ type: 'text', content: 'a', style: { lineHeight: 2 } }])).style.lineHeight === 2));
      checks.push(check('import allowlists unknown line height', firstEl(slidesOf([{ type: 'text', content: 'a', style: { lineHeight: 3 } }])).style.lineHeight === 1.15));
      checks.push(check('trusted import keeps external image url', normalizePresentation(slidesOf([{ type: 'image', content: 'https://ok.example/x.png' }]), { trusted: true }).slides[0].elements[0].content === 'https://ok.example/x.png'));
      checks.push(check('import truncates over-long text', firstEl(slidesOf([{ type: 'text', content: 'x'.repeat(LIMITS.MAX_TEXT_LENGTH + 5000) }])).content.length === LIMITS.MAX_TEXT_LENGTH));
      checks.push(check('import clamps wild coordinates', (() => {
        const el = firstEl(slidesOf([{ type: 'text', content: 'a', x: 1e12, y: -1e12, w: 1e15, h: 5 }]));
        return Number.isFinite(el.x) && Math.abs(el.x) <= LIMITS.MAX_COORD && el.w <= LIMITS.MAX_SIZE;
      })()));
      checks.push(check('corrupted json throws on parse', (() => { try { parsePresentationText('{bad'); return false; } catch { return true; } })()));
      checks.push(check('import accepts current schema version', !!parsePresentationText(JSON.stringify({ schemaVersion: SCHEMA_VERSION, ...project }))));
      checks.push(check('import accepts legacy file without schema version', !!parsePresentationText(JSON.stringify(project))));
      checks.push(check('import rejects unknown future schema version', parsePresentationText(JSON.stringify({ schemaVersion: SCHEMA_VERSION + 1, ...project })) === null));
      checks.push(check('import allowlists text align (selector-injection)', ['left', 'center', 'right'].includes(firstEl(slidesOf([{ type: 'text', content: 'a', style: { align: '"]' } }])).style.align)));
      checks.push(check('import neutralizes css-url background', normalizePresentation({ slides: [{ id: 's', background: 'url(https://evil.example/x.png)', elements: [] }] }).slides[0].background === '#ffffff'));
      checks.push(check('import keeps valid hex background', normalizePresentation({ slides: [{ id: 's', background: '#123456', elements: [] }] }).slides[0].background === '#123456'));
      checks.push(check('import neutralizes css-url shape fill', firstEl(slidesOf([{ type: 'shape', shape: 'rect', style: { fill: 'url(https://evil.example/x.png)' } }])).style.fill !== 'url(https://evil.example/x.png)'));
      checks.push(check('import handles null slide entries without throwing', (() => {
        const n = normalizePresentation({ slides: [null, { id: 'ok', elements: [] }] });
        return !!n && n.slides.length === 2 && typeof n.slides[0].id === 'string';
      })()));
      checks.push(check('import rejects too many total elements', normalizePresentation({ slides: Array.from({ length: 60 }, (_, i) => ({ id: 's' + i, elements: Array.from({ length: 90 }, () => ({ type: 'text', content: 'a' })) })) }) === null));
      checks.push(check('import makes duplicate slide ids unique', (() => {
        const n = normalizePresentation({ slides: [{ id: 'dup', elements: [] }, { id: 'dup', elements: [] }] });
        return n.slides[0].id !== n.slides[1].id;
      })()));
      checks.push(check('import makes duplicate element ids unique', (() => {
        const n = normalizePresentation(slidesOf([{ type: 'text', id: 'e', content: 'a' }, { type: 'text', id: 'e', content: 'b' }]));
        return n.slides[0].elements[0].id !== n.slides[0].elements[1].id;
      })()));
      checks.push(check('import dedupes element ids across slides', (() => {
        const n = normalizePresentation({ slides: [{ id: 's1', elements: [{ type: 'text', id: 'e', content: 'a' }] }, { id: 's2', elements: [{ type: 'text', id: 'e', content: 'b' }] }] });
        return n.slides[0].elements[0].id !== n.slides[1].elements[0].id;
      })()));
      checks.push(check('import resolves currentSlideId after dedupe', (() => {
        const n = normalizePresentation({ slides: [{ id: 'dup', elements: [] }, { id: 'dup', elements: [] }], currentSlideId: 'dup' });
        return n.currentSlideId === n.slides[0].id && n.slides.some(s => s.id === n.currentSlideId);
      })()));
      checks.push(check('import resolves truncation-collision ids uniquely', (() => {
        const longA = 'x'.repeat(70) + 'A';
        const longB = 'x'.repeat(70) + 'B';
        const n = normalizePresentation(slidesOf([{ type: 'text', id: longA, content: 'a' }, { type: 'text', id: longB, content: 'b' }]));
        return n.slides[0].elements[0].id !== n.slides[0].elements[1].id;
      })()));

      // Сценарій історії: фігура -> новий слайд -> один Undo має прибрати лише
      // слайд і зберегти раніше додану фігуру (регресія off-by-one в undo).
      const countShapes = () => doc.querySelectorAll('#stage .shape-element').length;
      const countSlides = () => doc.querySelectorAll('#slideList .slide-card').length;
      const clickAction = action => {
        const buttons = Array.from(doc.querySelectorAll(`[data-action="${action}"]`));
        const button = buttons.find(node => !node.closest('.menu-dropdown')) || buttons[0];
        if (!button) throw new Error(`action button missing: ${action}`);
        button.click();
      };

      const shapesBefore = countShapes();
      const slidesBefore = countSlides();

      clickAction('insert-rect');
      await waitFor(() => countShapes() === shapesBefore + 1, 'shape inserted');

      clickAction('new-slide');
      await waitFor(() => countSlides() === slidesBefore + 1, 'slide added');

      clickAction('undo');
      await waitFor(() => countSlides() === slidesBefore, 'undo removes the new slide');

      checks.push(check('undo removes only the new slide', countSlides() === slidesBefore));
      checks.push(check('undo keeps the earlier shape', countShapes() === shapesBefore + 1));

      clickAction('redo');
      await waitFor(() => countSlides() === slidesBefore + 1, 'redo restores the new slide');
      checks.push(check('redo restores the new slide', countSlides() === slidesBefore + 1));

      // Placeholder-регресія + коаліс­ція введення. Беремо body-плейсхолдер
      // СВІЖОГО слайда (його, на відміну від заголовка, не авто-фокусить, тож
      // він стабільно лишається placeholder незалежно від завантаженої
      // презентації). Безперервне введення в одній сесії має скасовуватися
      // ОДНИМ Undo і повертати саме плейсхолдер — і текст, і ознаку
      // is-placeholder (стиль плейсхолдера).
      clickAction('new-slide');
      await wait(60); // дати rAF авто-фокус заголовка відпрацювати
      await waitFor(() => doc.querySelectorAll('#stage .text-element.is-placeholder').length >= 1, 'fresh placeholder rendered');
      const bodyPh = doc.querySelector('#stage .text-element.is-placeholder');
      const originalPlaceholder = bodyPh.textContent;
      const wasPlaceholder = bodyPh.classList.contains('is-placeholder');
      bodyPh.focus();
      ['П', 'Пр', 'При', 'Привіт'].forEach(value => {
        bodyPh.textContent = value;
        bodyPh.dispatchEvent(new win.InputEvent('input', { bubbles: true }));
      });
      bodyPh.blur();
      await waitFor(() => {
        const node = Array.from(doc.querySelectorAll('#stage .text-element')).find(n => n.textContent === 'Привіт');
        return !!node;
      }, 'placeholder typing applied');
      clickAction('undo');
      await waitFor(() => {
        const node = Array.from(doc.querySelectorAll('#stage .text-element')).find(n => n.textContent === originalPlaceholder);
        return !!node;
      }, 'one Undo restores the placeholder text');
      const restoredPh = Array.from(doc.querySelectorAll('#stage .text-element')).find(n => n.textContent === originalPlaceholder);
      checks.push(check('continuous typing reverts in one Undo', wasPlaceholder && !!restoredPh));
      checks.push(check('Undo restores original placeholder content', !!restoredPh && restoredPh.textContent === originalPlaceholder));
      checks.push(check('Undo restores placeholder styling (is-placeholder)', !!restoredPh && restoredPh.classList.contains('is-placeholder')));

      // Автозбереження ЧЕРНЕТКИ асинхронне — чекаємо його завершення, а не
      // фіксовану паузу. Після нього бейдж ФАЙЛА має лишатися "Є зміни".
      await waitFor(() => /Чернетку збережено/.test(doc.querySelector('#statusRight').textContent), 'autosave persists draft', 5000);
      checks.push(check('autosave reports draft (not file) saved', /Чернетку збережено/.test(doc.querySelector('#statusRight').textContent)));
      checks.push(check('autosave keeps the file marked dirty', doc.querySelector('#saveBadge').textContent.trim() === 'Є зміни'));

      // Мультивибір: Ctrl+A обирає всі об'єкти, Delete видаляє всіх вибраних
      // одним кроком історії, Undo повертає; shift-клік перемикає об'єкт у вибірці.
      clickAction('insert-rect');
      clickAction('insert-rect');
      await waitFor(() => doc.querySelectorAll('#stage .shape-element').length >= 2, 'two shapes inserted');
      const totalEls = doc.querySelectorAll('#stage .stage-element').length;
      doc.activeElement?.blur?.();
      doc.dispatchEvent(new win.KeyboardEvent('keydown', { key: 'a', ctrlKey: true, bubbles: true }));
      await waitFor(() => doc.querySelectorAll('#stage .stage-element.selected').length === totalEls, 'Ctrl+A selects all');
      checks.push(check('Ctrl+A selects all objects', totalEls >= 2 && doc.querySelectorAll('#stage .stage-element.selected').length === totalEls));

      clickAction('delete-element');
      await waitFor(() => doc.querySelectorAll('#stage .stage-element').length === 0, 'multi-delete removes all');
      checks.push(check('delete removes all selected objects', doc.querySelectorAll('#stage .stage-element').length === 0));

      clickAction('undo');
      await waitFor(() => doc.querySelectorAll('#stage .stage-element').length === totalEls, 'undo restores multi-delete');
      checks.push(check('one Undo restores multi-delete', doc.querySelectorAll('#stage .stage-element').length === totalEls));

      const selectedBeforeToggle = doc.querySelectorAll('#stage .stage-element.selected').length;
      const toggleWrap = Array.from(doc.querySelectorAll('#stage .stage-element')).find(w => !w.querySelector('.text-element'));
      if (toggleWrap && selectedBeforeToggle >= 2) {
        toggleWrap.dispatchEvent(new win.PointerEvent('pointerdown', { shiftKey: true, bubbles: true, pointerId: 11 }));
        await waitFor(() => doc.querySelectorAll('#stage .stage-element.selected').length === selectedBeforeToggle - 1, 'shift-click toggles selection');
        checks.push(check('shift-click toggles object in selection', doc.querySelectorAll('#stage .stage-element.selected').length === selectedBeforeToggle - 1));
      }

      // Рамка вибору (marquee): протягування через усю сцену обирає всі об'єкти.
      const stageEl = doc.querySelector('#stage');
      const r = stageEl.getBoundingClientRect();
      stageEl.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 30, clientX: r.left + 2, clientY: r.top + 2 }));
      stageEl.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 30, clientX: r.right - 2, clientY: r.bottom - 2 }));
      stageEl.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 30, clientX: r.right - 2, clientY: r.bottom - 2 }));
      await waitFor(() => doc.querySelectorAll('#stage .stage-element.selected').length === totalEls, 'marquee selects all');
      checks.push(check('marquee selection covers intersecting objects', doc.querySelectorAll('#stage .stage-element.selected').length === totalEls));

      // Мульти copy/paste: вибрати всі, копіювати, вставити — кількість подвоюється,
      // вибраними стають нові копії.
      doc.dispatchEvent(new win.KeyboardEvent('keydown', { key: 'a', ctrlKey: true, bubbles: true }));
      await waitFor(() => doc.querySelectorAll('#stage .stage-element.selected').length === totalEls, 'reselect all for copy');
      clickAction('copy');
      clickAction('paste');
      await waitFor(() => doc.querySelectorAll('#stage .stage-element').length === totalEls * 2, 'paste doubles count');
      checks.push(check('multi copy/paste duplicates the selection', doc.querySelectorAll('#stage .stage-element').length === totalEls * 2));
      checks.push(check('paste selects the new copies', doc.querySelectorAll('#stage .stage-element.selected').length === totalEls));

      // Змішане форматування: вибірка з тексту й фігур пропонує режими кольору обох.
      clickAction('color-panel');
      await waitFor(() => doc.querySelectorAll('#colorModeButtons .color-mode-btn').length > 0, 'color modes rendered');
      const modeLabels = Array.from(doc.querySelectorAll('#colorModeButtons .color-mode-btn')).map(b => b.textContent.trim());
      checks.push(check('mixed selection offers text and shape color modes', modeLabels.includes('Текст') && modeLabels.includes('Заливка')));

      // Zoom: масштаб змінює лише вигляд (CSS-змінна), не координати моделі.
      const zoomBadge = doc.querySelector('#zoomLevel');
      const sizer = doc.querySelector('#stageSizer');
      clickAction('zoom-100');
      await waitFor(() => zoomBadge.textContent.trim() === '100%', 'zoom resets to 100%');
      checks.push(check('zoom reset shows 100%', zoomBadge.textContent.trim() === '100%' && sizer.style.getPropertyValue('--stage-zoom') === '1'));
      const zoomEl = doc.querySelector('#stage .stage-element');
      const leftBeforeZoom = zoomEl?.style.left;
      clickAction('zoom-in');
      await waitFor(() => parseFloat(sizer.style.getPropertyValue('--stage-zoom')) > 1, 'zoom-in increases scale');
      checks.push(check('zoom-in increases the visual scale', parseFloat(sizer.style.getPropertyValue('--stage-zoom')) > 1));
      checks.push(check('zoom does not move model coordinates', doc.querySelector('#stage .stage-element')?.style.left === leftBeforeZoom));

      // Pointer-взаємодії при zoom != 100% мають переводити екранні координати
      // назад у логічні координати слайда.
      const zoomScale = parseFloat(sizer.style.getPropertyValue('--stage-zoom'));
      const scaledShape = doc.querySelector('#stage .stage-element:has(.shape-element)');
      const shapeRect = scaledShape.getBoundingClientRect();
      const dragStartX = shapeRect.left + shapeRect.width / 2;
      const dragStartY = shapeRect.top + shapeRect.height / 2;
      const dragLeftBefore = parseFloat(scaledShape.style.left);
      const dragTopBefore = parseFloat(scaledShape.style.top);
      scaledShape.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 40, clientX: dragStartX, clientY: dragStartY }));
      stageEl.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 40, clientX: dragStartX + 24 * zoomScale, clientY: dragStartY + 18 * zoomScale }));
      stageEl.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 40, clientX: dragStartX + 24 * zoomScale, clientY: dragStartY + 18 * zoomScale }));
      checks.push(check('drag at zoom preserves logical delta', Math.abs(parseFloat(scaledShape.style.left) - dragLeftBefore - 24) < 0.5 && Math.abs(parseFloat(scaledShape.style.top) - dragTopBefore - 18) < 0.5));

      const resizeHandle = scaledShape.querySelector('.resize-handle.se');
      const handleRect = resizeHandle.getBoundingClientRect();
      const resizeStartX = handleRect.left + handleRect.width / 2;
      const resizeStartY = handleRect.top + handleRect.height / 2;
      const widthBeforeResize = parseFloat(scaledShape.style.width);
      const heightBeforeResize = parseFloat(scaledShape.style.height);
      resizeHandle.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 41, clientX: resizeStartX, clientY: resizeStartY }));
      stageEl.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 41, clientX: resizeStartX + 30 * zoomScale, clientY: resizeStartY + 20 * zoomScale }));
      stageEl.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 41, clientX: resizeStartX + 30 * zoomScale, clientY: resizeStartY + 20 * zoomScale }));
      checks.push(check('resize at zoom preserves logical delta', Math.abs(parseFloat(scaledShape.style.width) - widthBeforeResize - 30) < 0.5 && Math.abs(parseFloat(scaledShape.style.height) - heightBeforeResize - 20) < 0.5));

      const scaledStageRect = stageEl.getBoundingClientRect();
      stageEl.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 42, clientX: scaledStageRect.left + 2, clientY: scaledStageRect.top + 2 }));
      stageEl.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 42, clientX: scaledStageRect.right - 2, clientY: scaledStageRect.bottom - 2 }));
      stageEl.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 42, clientX: scaledStageRect.right - 2, clientY: scaledStageRect.bottom - 2 }));
      await waitFor(() => doc.querySelectorAll('#stage .stage-element.selected').length === totalEls * 2, 'marquee selects all at zoom');
      checks.push(check('marquee works at zoom', doc.querySelectorAll('#stage .stage-element.selected').length === totalEls * 2));

      clickAction('zoom-fit');
      await waitFor(() => parseFloat(sizer.style.getPropertyValue('--stage-zoom')) <= 1, 'zoom-fit fits within 100%');
      checks.push(check('zoom-fit keeps scale within 100%', parseFloat(sizer.style.getPropertyValue('--stage-zoom')) <= 1));

      // Smart guides + прив'язка: на чистому слайді центр об'єкта прилипає до
      // центра слайда (480), з'являється напрямна; після відпускання — зникає.
      clickAction('zoom-100');
      await waitFor(() => sizer.style.getPropertyValue('--stage-zoom') === '1', 'reset zoom for snap');
      clickAction('new-slide');
      await wait(80);
      clickAction('insert-rect');
      await waitFor(() => Array.from(doc.querySelectorAll('#stage .stage-element')).some(w => w.querySelector('.shape-element')), 'shape for snap');
      const snapWrap = Array.from(doc.querySelectorAll('#stage .stage-element')).find(w => w.querySelector('.shape-element'));
      const snW = parseFloat(snapWrap.style.width);
      const snH = parseFloat(snapWrap.style.height);
      const snCx0 = parseFloat(snapWrap.style.left) + snW / 2;
      const snCy0 = parseFloat(snapWrap.style.top) + snH / 2;
      const snRect = stageEl.getBoundingClientRect();
      const snToX = lx => snRect.left + lx * snRect.width / 960;
      const snToY = ly => snRect.top + ly * snRect.height / 540;
      snapWrap.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 50, clientX: snToX(snCx0), clientY: snToY(snCy0) }));
      stageEl.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 50, clientX: snToX(481), clientY: snToY(snCy0) }));
      await wait(60);
      const snappedW = Array.from(doc.querySelectorAll('#stage .stage-element')).find(w => w.querySelector('.shape-element'));
      const snNewCx = parseFloat(snappedW.style.left) + snW / 2;
      checks.push(check('drag snaps object center to slide center', Math.abs(snNewCx - 480) < 1));
      checks.push(check('smart guide appears while snapping', !!doc.querySelector('#stage .snap-guide-v')));
      stageEl.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 50, clientX: snToX(481), clientY: snToY(snCy0) }));
      await waitFor(() => !doc.querySelector('#stage .snap-guide'), 'guides clear after drag');
      checks.push(check('guides clear after drag ends', !doc.querySelector('#stage .snap-guide')));

      // Прив'язка до сітки: з увімкненим snapToGrid позиція округлюється до 10px
      // (тягнемо далеко від smart-цілей, щоб спрацювала саме сітка).
      clickAction('toggle-snap');
      const gCx0 = parseFloat(snapWrap.style.left) + snW / 2;
      const gCy0 = parseFloat(snapWrap.style.top) + snH / 2;
      snapWrap.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 51, clientX: snToX(gCx0), clientY: snToY(gCy0) }));
      stageEl.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 51, clientX: snToX(337), clientY: snToY(gCy0) }));
      await wait(60);
      checks.push(check('snap-to-grid rounds position to 10px', Math.round(parseFloat(snapWrap.style.left)) % 10 === 0));
      stageEl.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 51, clientX: snToX(337), clientY: snToY(gCy0) }));
      clickAction('toggle-snap');

      // Прив'язка працює й при zoom != 100% (поріг — у екранних px, не логічних).
      for (let i = 0; i < 10; i += 1) clickAction('zoom-in');
      await waitFor(() => parseFloat(sizer.style.getPropertyValue('--stage-zoom')) > 1.5, 'zoom to >150%');
      const zr = stageEl.getBoundingClientRect();
      const zToX = lx => zr.left + lx * zr.width / 960;
      const zToY = ly => zr.top + ly * zr.height / 540;
      const zCx0 = parseFloat(snapWrap.style.left) + snW / 2;
      const zCy0 = parseFloat(snapWrap.style.top) + snH / 2;
      snapWrap.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 52, clientX: zToX(zCx0), clientY: zToY(zCy0) }));
      stageEl.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 52, clientX: zToX(481), clientY: zToY(zCy0) }));
      await wait(60);
      checks.push(check('snapping works at non-100% zoom', Math.abs(parseFloat(snapWrap.style.left) + snW / 2 - 480) < 1));
      stageEl.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 52, clientX: zToX(481), clientY: zToY(zCy0) }));
      clickAction('zoom-100');

      // === 2.3 покращення взаємодії: поворот, Shift-пропорції, Alt+drag, контекст-меню ===
      clickAction('new-slide');
      await wait(80);
      clickAction('insert-rect');
      await waitFor(() => Array.from(doc.querySelectorAll('#stage .stage-element')).some(w => w.querySelector('.shape-element')), 'shape for 2.3');
      const ixWrap = Array.from(doc.querySelectorAll('#stage .stage-element')).find(w => w.querySelector('.shape-element'));
      const ixRect = stageEl.getBoundingClientRect();
      const ixToX = lx => ixRect.left + lx * ixRect.width / 960;
      const ixToY = ly => ixRect.top + ly * ixRect.height / 540;

      // Shift на кутовій ручці зберігає пропорції стартового боксу (1.5).
      const aw0 = parseFloat(ixWrap.style.width);
      const ah0 = parseFloat(ixWrap.style.height);
      const seHandle = ixWrap.querySelector('.resize-handle.se');
      const seRect = seHandle.getBoundingClientRect();
      seHandle.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 60, clientX: seRect.left + seRect.width / 2, clientY: seRect.top + seRect.height / 2 }));
      stageEl.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 60, shiftKey: true, clientX: seRect.left + seRect.width / 2 + 60 * (ixRect.width / 960), clientY: seRect.top + seRect.height / 2 + 20 * (ixRect.height / 540) }));
      await wait(40);
      const arNow = parseFloat(ixWrap.style.width) / parseFloat(ixWrap.style.height);
      checks.push(check('Shift resize keeps aspect ratio', Math.abs(arNow - aw0 / ah0) < 0.02));
      stageEl.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 60, clientX: seRect.left + seRect.width / 2 + 60, clientY: seRect.top + seRect.height / 2 + 20 }));

      // Ручка повороту обертає об'єкт (Shift — крок 15°): тягнемо праворуч → 90°.
      const rCx = parseFloat(ixWrap.style.left) + parseFloat(ixWrap.style.width) / 2;
      const rCy = parseFloat(ixWrap.style.top) + parseFloat(ixWrap.style.height) / 2;
      const rotHandle = ixWrap.querySelector('.rotate-handle');
      checks.push(check('rotation handle is present for single selection', !!rotHandle));
      rotHandle.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 61, clientX: ixToX(rCx), clientY: ixToY(rCy - 30) }));
      stageEl.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 61, shiftKey: true, clientX: ixToX(rCx + 100), clientY: ixToY(rCy) }));
      await wait(40);
      checks.push(check('rotation handle rotates the object to 90deg', /rotate\(90deg\)/.test(ixWrap.style.transform)));
      stageEl.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 61, clientX: ixToX(rCx + 100), clientY: ixToY(rCy) }));

      // Після повороту resize працює у локальних осях: візуальна права ручка
      // при 90° рухається вниз і збільшує саме ширину елемента.
      const rotatedWidth0 = parseFloat(ixWrap.style.width);
      const rotatedHeight0 = parseFloat(ixWrap.style.height);
      const rotatedEast = ixWrap.querySelector('.resize-handle.e');
      const rotatedEastRect = rotatedEast.getBoundingClientRect();
      const rotatedEastX = rotatedEastRect.left + rotatedEastRect.width / 2;
      const rotatedEastY = rotatedEastRect.top + rotatedEastRect.height / 2;
      const rotatedResizeDelta = 60 * (ixRect.height / 540);
      rotatedEast.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 63, clientX: rotatedEastX, clientY: rotatedEastY }));
      stageEl.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 63, clientX: rotatedEastX, clientY: rotatedEastY + rotatedResizeDelta }));
      await wait(40);
      checks.push(check('resize follows local axes after rotation', parseFloat(ixWrap.style.width) > rotatedWidth0 + 50 && Math.abs(parseFloat(ixWrap.style.height) - rotatedHeight0) < 1));
      stageEl.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 63, clientX: rotatedEastX, clientY: rotatedEastY + rotatedResizeDelta }));

      // Alt+drag дублює об'єкт (оригінал лишається).
      const beforeAlt = doc.querySelectorAll('#stage .shape-element').length;
      const altCx = parseFloat(ixWrap.style.left) + parseFloat(ixWrap.style.width) / 2;
      const altCy = parseFloat(ixWrap.style.top) + parseFloat(ixWrap.style.height) / 2;
      ixWrap.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 62, altKey: true, clientX: ixToX(altCx), clientY: ixToY(altCy) }));
      stageEl.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 62, altKey: true, clientX: ixToX(altCx + 40), clientY: ixToY(altCy + 40) }));
      stageEl.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 62, clientX: ixToX(altCx + 40), clientY: ixToY(altCy + 40) }));
      await waitFor(() => doc.querySelectorAll('#stage .shape-element').length === beforeAlt + 1, 'alt-drag duplicates');
      checks.push(check('Alt+drag duplicates the object', doc.querySelectorAll('#stage .shape-element').length === beforeAlt + 1));

      // Права кнопка показує контекстне меню; Escape ховає.
      const ctxMenu = doc.querySelector('#contextMenu');
      const ctxWrap = Array.from(doc.querySelectorAll('#stage .stage-element')).find(w => w.querySelector('.shape-element'));
      ctxWrap.dispatchEvent(new win.MouseEvent('contextmenu', { bubbles: true, clientX: 120, clientY: 120 }));
      checks.push(check('right-click shows object context menu', !ctxMenu.classList.contains('hidden')));
      doc.dispatchEvent(new win.KeyboardEvent('keydown', { key: 'Escape', bubbles: true }));
      checks.push(check('Escape hides the context menu', ctxMenu.classList.contains('hidden')));

      // === 2.4 доступність: keyboard-навігація об'єктами і слайдами ===
      clickAction('new-slide');
      await wait(60);
      clickAction('insert-rect');
      await waitFor(() => doc.querySelectorAll('#stage .stage-element').length >= 3, 'objects for Tab');
      const wsEl = doc.querySelector('#workspace');
      wsEl.focus();
      doc.dispatchEvent(new win.KeyboardEvent('keydown', { key: 'Tab', bubbles: true }));
      const tabSel1 = doc.querySelector('#stage .stage-element.selected')?.dataset.id;
      doc.dispatchEvent(new win.KeyboardEvent('keydown', { key: 'Tab', bubbles: true }));
      const tabSel2 = doc.querySelector('#stage .stage-element.selected')?.dataset.id;
      checks.push(check('Tab cycles object selection', !!tabSel1 && !!tabSel2 && tabSel1 !== tabSel2));

      // Стрілки в списку слайдів переходять між слайдами.
      const firstThumb = doc.querySelector('#slideList .slide-card .slide-thumb-button');
      firstThumb.click();
      await wait(20);
      const cardsAll = Array.from(doc.querySelectorAll('#slideList .slide-card'));
      const activeBefore = cardsAll.findIndex(c => c.classList.contains('active'));
      doc.querySelector('#slideList .slide-card.active .slide-thumb-button').focus();
      doc.dispatchEvent(new win.KeyboardEvent('keydown', { key: 'ArrowDown', bubbles: true }));
      await wait(20);
      const activeAfter = Array.from(doc.querySelectorAll('#slideList .slide-card')).findIndex(c => c.classList.contains('active'));
      checks.push(check('Arrow keys navigate slides in the list', activeAfter === activeBefore + 1));
      checks.push(check('slide thumbnail has aria-label', /Слайд \d+/.test(doc.querySelector('#slideList .slide-thumb-button')?.getAttribute('aria-label') || '')));

      // Tab поза полотном НЕ циклить об'єкти (не блокує звичайний обхід).
      const wsCard = doc.querySelector('#slideList .slide-card.active .slide-thumb-button') || doc.querySelector('.tb-btn');
      const selBeforeOffTab = doc.querySelector('#stage .stage-element.selected')?.dataset.id || '';
      wsCard.focus();
      doc.dispatchEvent(new win.KeyboardEvent('keydown', { key: 'Tab', bubbles: true }));
      const selAfterOffTab = doc.querySelector('#stage .stage-element.selected')?.dataset.id || '';
      checks.push(check('Tab off the canvas does not cycle objects', selBeforeOffTab === selAfterOffTab));

      // Shift+F10 відкриває контекст-меню з клавіатури й фокусує пункт.
      doc.querySelector('#workspace').focus();
      doc.dispatchEvent(new win.KeyboardEvent('keydown', { key: 'Tab', bubbles: true })); // обираємо об'єкт
      doc.dispatchEvent(new win.KeyboardEvent('keydown', { key: 'F10', shiftKey: true, bubbles: true }));
      await waitFor(() => !doc.querySelector('#contextMenu').classList.contains('hidden'), 'context menu opens via keyboard');
      checks.push(check('Shift+F10 opens context menu from keyboard', !doc.querySelector('#contextMenu').classList.contains('hidden')));
      await waitFor(() => doc.querySelector('#contextMenu').contains(doc.activeElement), 'context menu item focused');
      checks.push(check('keyboard context menu focuses an item', doc.querySelector('#contextMenu').contains(doc.activeElement)));
      doc.activeElement.dispatchEvent(new win.KeyboardEvent('keydown', { key: 'Escape', bubbles: true }));
      await waitFor(() => doc.querySelector('#contextMenu').classList.contains('hidden'), 'Escape closes keyboard context menu');
      checks.push(check('Escape closes the keyboard context menu', doc.querySelector('#contextMenu').classList.contains('hidden')));

      // Після виконання команди з клавіатурного меню фокус повертається на
      // workspace, а не лишається на прихованій кнопці.
      doc.dispatchEvent(new win.KeyboardEvent('keydown', { key: 'F10', shiftKey: true, bubbles: true }));
      await waitFor(() => doc.querySelector('#contextMenu').contains(doc.activeElement), 'context menu refocused');
      doc.activeElement.click();
      await waitFor(() => doc.querySelector('#contextMenu').classList.contains('hidden'), 'context menu closes after command');
      checks.push(check('context-menu command restores workspace focus', doc.activeElement === doc.querySelector('#workspace')));

      // === 3.1 текст: вага шрифту, сімейство, довільний розмір, міжрядковий інтервал ===
      clickAction('new-slide');
      await wait(60);
      const bodyTextNode = () => Array.from(doc.querySelectorAll('#stage .stage-element')).filter(w => w.querySelector('.text-element'))[1]?.querySelector('.text-element');
      bodyTextNode().dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 70 }));
      await wait(30);
      checks.push(check('non-bold text renders at normal weight (400)', bodyTextNode().style.fontWeight === '400'));

      const ffSel = doc.querySelector('#fontFamilySelect');
      ffSel.value = 'serif';
      ffSel.dispatchEvent(new win.Event('change', { bubbles: true }));
      await waitFor(() => /serif/i.test(bodyTextNode().style.fontFamily || ''), 'font family applies');
      checks.push(check('font family applies to selected text', /serif/i.test(bodyTextNode().style.fontFamily || '')));

      const fsSel = doc.querySelector('#fontSizeSelect');
      fsSel.value = '37';
      fsSel.dispatchEvent(new win.Event('input', { bubbles: true }));
      await waitFor(() => bodyTextNode().style.fontSize === '37px', 'arbitrary font size applies');
      checks.push(check('arbitrary font size applies', bodyTextNode().style.fontSize === '37px'));
      fsSel.value = '3';
      fsSel.dispatchEvent(new win.Event('input', { bubbles: true }));
      checks.push(check('partial font size input waits for a valid value', bodyTextNode().style.fontSize === '37px' && fsSel.value === '3'));
      fsSel.value = '37';
      fsSel.dispatchEvent(new win.Event('change', { bubbles: true }));
      clickAction('undo');
      await waitFor(() => bodyTextNode().style.fontSize === '28px', 'font size undo');
      checks.push(check('font size input and change share one history step', bodyTextNode().style.fontSize === '28px'));
      clickAction('redo');
      await waitFor(() => bodyTextNode().style.fontSize === '37px', 'font size redo');
      checks.push(check('font size redo restores arbitrary value', bodyTextNode().style.fontSize === '37px'));

      bodyTextNode().dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 71 }));
      const lhSel = doc.querySelector('#lineHeightSelect');
      lhSel.value = '2';
      lhSel.dispatchEvent(new win.Event('change', { bubbles: true }));
      await waitFor(() => bodyTextNode().style.lineHeight === '2', 'line spacing applies');
      checks.push(check('line spacing applies to selected text', bodyTextNode().style.lineHeight === '2'));

      // Restore-after-reload: збережена чернетка має відновитися на старті
      // (hydration). Зберігаємо маркерну чернетку й перезавантажуємо редактор.
      // Чекаємо завершення останнього debounce з активного iframe, щоб він не
      // перезаписав маркерну чернетку вже після її збереження.
      await wait(400);
      await clearDraft();
      const draftMarker = 'Чернетка-' + Date.now();
      await saveDraft({ schemaVersion: 1, fileName: draftMarker, slides: [{ id: 's1', background: '#ffffff', elements: [{ type: 'text', content: 'Текст', x: 100, y: 100, w: 200, h: 80 }] }], currentSlideId: 's1' });
      await loadFrame('../slides/index.html?reload=1');
      const reloadedDoc = frame.contentDocument;
      const reloadedWin = frame.contentWindow;
      await waitFor(() => typeof reloadedWin.SlidesApp?.boot === 'function', 'reloaded boot');
      await waitFor(() => reloadedDoc.querySelector('#fileName')?.textContent === draftMarker, 'draft restored after reload', 6000);
      checks.push(check('draft restores after reload (hydration)', reloadedDoc.querySelector('#fileName')?.textContent === draftMarker));

      result.className = 'pass';
      result.textContent = checks.join('\n') + '\n\nPASSED';
      document.body.dataset.slidesBehavior = 'passed';
    }

    // Guard: чернетка (IndexedDB) спільна для tests/ і slides/. Зберігаємо
    // реальну чернетку користувача ДО тесту і ВІДНОВЛЮЄМО її у finally, тож
    // запуск тесту (навіть у живому профілі) не знищує збережену презентацію.
    async function runGuarded() {
      let savedDraft = null;
      try { savedDraft = await loadDraft(); } catch {}
      try {
        try { await clearDraft(); } catch {}
        await run();
      } finally {
        await wait(350); // дочекатися останнього autosave перед відновленням
        try {
          if (savedDraft) await saveDraft(savedDraft);
          else await clearDraft();
        } catch {}
      }
    }

    runGuarded().catch(error => {
      result.className = 'fail';
      result.textContent = String(error && error.stack || error);
      document.body.dataset.slidesBehavior = 'failed';
    });
  </script>
</body>
</html>
