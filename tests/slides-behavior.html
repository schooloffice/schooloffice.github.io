<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slides Behavior</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; color: #162033; }
    iframe { width: 960px; height: 540px; border: 1px solid #d6dce5; border-radius: 8px; }
    pre { white-space: pre-wrap; padding: 16px; border: 1px solid #d6dce5; border-radius: 8px; background: #f8fafc; }
    .pass { color: #15803d; }
    .fail { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Slides Behavior</h1>
  <pre id="result">Running...</pre>
  <iframe id="slidesFrame"></iframe>

  <script type="module">
    import { normalizePresentation, parsePresentationText, slugify } from '../slides/js/project.js';
    import { LIMITS, SCHEMA_VERSION, TEXT_MODEL_VERSION } from '../slides/js/constants.js';
    import { createSlideSnapshot, createThumbSnapshot } from '../slides/js/export.js';
    import { chooseNewerDraftRecord, loadDraft, saveDraft, clearDraft } from '../slides/js/storage.js';
    import { elementBounds } from '../slides/js/stage-interactions.js';

    const result = document.getElementById('result');
    const frame = document.getElementById('slidesFrame');

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function waitFor(predicate, label, timeout = 5000) {
      const start = performance.now();
      while (performance.now() - start < timeout) {
        if (predicate()) return;
        await wait(100);
      }
      throw new Error(label);
    }

    function check(name, ok) {
      if (!ok) throw new Error(name);
      return `PASS ${name}`;
    }

    function loadFrame(url) {
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error('slides iframe load timed out')), 7000);
        frame.addEventListener('load', () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
        frame.src = url;
      });
    }

    async function run() {
      await import('../slides/js/app.js');
      check('Slides app module import', typeof window.SlidesApp?.boot === 'function');

      // Storage-перевірки ДО запуску застосунку в iframe (немає гонки з
      // autosave). Залишаємо сховище чистим для детермінованого старту.
      let idbRoundTrips = false;
      let clearDraftWorks = false;
      let imageDraftRoundTrips = false;
      let quotaFailurePropagates = false;
      let storageRecoversAfterFailure = false;
      let wrappedDraftLoads = false;
      let legacyDraftLoads = false;
      let clearWritesTombstone = false;
      let equalTimestampTombstoneWins = false;
      try {
        await clearDraft();
        await saveDraft({ probe: 'idb-roundtrip' });
        const back = await loadDraft();
        idbRoundTrips = !!back && back.probe === 'idb-roundtrip';

        await clearDraft();
        clearDraftWorks = (await loadDraft()) === null;

        // Багатомегабайтний data-URL доводить, що реалістична презентація з
        // великим зображенням зберігається й відновлюється через IndexedDB.
        const imageDraft = { schemaVersion: SCHEMA_VERSION, fileName: 'З фото', slides: [{ id: 's1', background: '#ffffff', elements: [{ type: 'image', content: 'data:image/png;base64,' + 'A'.repeat(3 * 1024 * 1024), x: 0, y: 0, w: 100, h: 100 }] }], currentSlideId: 's1' };
        await saveDraft(imageDraft);
        const imageBack = await loadDraft();
        imageDraftRoundTrips = !!imageBack && imageBack.slides?.[0]?.elements?.[0]?.content === imageDraft.slides[0].elements[0].content;
        await clearDraft();

        // При однаковому timestamp tombstone повинен перемогти живу чернетку.
        const tieSavedAt = 123456789;
        const chosenTie = chooseNewerDraftRecord(
          { savedAt: tieSavedAt, payload: { probe: 'stale-idb' } },
          { savedAt: tieSavedAt, payload: null }
        );
        equalTimestampTombstoneWins = chosenTie?.payload === null;

        // Детерміновано імітуємо quota failure, не заповнюючи диск. Помилка
        // повинна повернутися викликачеві, а наступне збереження — працювати.
        const putDescriptor = Object.getOwnPropertyDescriptor(IDBObjectStore.prototype, 'put');
        const setItemDescriptor = Object.getOwnPropertyDescriptor(Storage.prototype, 'setItem');
        try {
          Object.defineProperty(IDBObjectStore.prototype, 'put', {
            ...putDescriptor,
            value() { throw new DOMException('Quota exceeded in test', 'QuotaExceededError'); }
          });
          Object.defineProperty(Storage.prototype, 'setItem', {
            ...setItemDescriptor,
            value() { throw new DOMException('Quota exceeded in test', 'QuotaExceededError'); }
          });
          await saveDraft({ probe: 'quota-failure' });
        } catch (error) {
          quotaFailurePropagates = error?.name === 'QuotaExceededError';
        } finally {
          Object.defineProperty(IDBObjectStore.prototype, 'put', putDescriptor);
          Object.defineProperty(Storage.prototype, 'setItem', setItemDescriptor);
        }
        await saveDraft({ probe: 'after-quota-failure' });
        storageRecoversAfterFailure = (await loadDraft())?.probe === 'after-quota-failure';
        await clearDraft();

        // Формат запису: новий загорнутий {savedAt,payload} і legacy незагорнута
        // чернетка обидва коректно читаються (реконсиляція/зворотна сумісність).
        localStorage.setItem('art_slides_v1', JSON.stringify({ savedAt: 5, payload: { probe: 'wrapped' } }));
        wrappedDraftLoads = (await loadDraft())?.probe === 'wrapped';
        await clearDraft();
        localStorage.setItem('art_slides_v1', JSON.stringify({ probe: 'legacy', slides: [] }));
        legacyDraftLoads = (await loadDraft())?.probe === 'legacy';
        await clearDraft();

        // Очищення, коли IDB прибрати не вдалося, лишає tombstone (payload=null),
        // що приховує стару IDB-чернетку після reload; clearDraft звітує чесно.
        await saveDraft({ probe: 'to-clear' });
        const clearedReturn = await clearDraft();
        const afterClear = await loadDraft();
        const lsRaw = localStorage.getItem('art_slides_v1');
        const lsRec = lsRaw ? JSON.parse(lsRaw) : null;
        clearWritesTombstone = clearedReturn === true && afterClear === null && !!lsRec && lsRec.payload === null && typeof lsRec.savedAt === 'number';
      } catch {}

      await loadFrame('../slides/index.html');

      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      await waitFor(() => typeof win.SlidesApp?.boot === 'function', 'SlidesApp boot exported');
      await waitFor(() => doc.querySelectorAll('#slideList .slide-card').length >= 1, 'slide list rendered');
      await waitFor(() => doc.querySelectorAll('#stage .stage-element').length >= 1, 'stage elements rendered');
      const project = {
        fileName: 'Шкільна презентація',
        slides: [{
          id: 's1',
          background: '#ffffff',
          elements: [{
            id: 't1',
            type: 'text',
            x: 120,
            y: 120,
            w: 320,
            h: 90,
            content: 'Тема',
            style: { fontSize: 32 }
          }]
        }],
        currentSlideId: 's1'
      };
      const normalized = normalizePresentation(project);
      const parsed = parsePresentationText(JSON.stringify(project));
      const placeholderSlide = normalizePresentation({
        slides: [{
          id: 'placeholder-slide',
          elements: [
            { type: 'text', content: 'Введіть заголовок', placeholder: 'Введіть заголовок', isPlaceholder: true },
            { type: 'shape', shape: 'rect', content: 'Текст фігури', placeholder: 'Текст фігури', isPlaceholder: true }
          ]
        }]
      }).slides[0];
      const fullPlaceholderSnapshot = createSlideSnapshot(placeholderSlide);
      const thumbPlaceholderSnapshot = createThumbSnapshot(placeholderSlide);

      const checks = [
        check('SlidesApp boot exported', typeof win.SlidesApp?.boot === 'function'),
        check('slide list rendered', doc.querySelectorAll('#slideList .slide-card').length >= 1),
        check('stage rendered', !!doc.querySelector('#stage')),
        check('stage elements rendered', doc.querySelectorAll('#stage .stage-element').length >= 1),
        check('image transparency field defaults to zero percent', doc.querySelector('#imageOpacityInput').value === '0'),
        check('standard commands exported', ['new', 'open', 'save', 'undo', 'redo'].every(command => !!doc.querySelector(`[data-office-command="${command}"]`))),
        check('project normalize keeps file name', normalized?.fileName === 'Шкільна презентація'),
        check('project normalize keeps elements', normalized?.slides?.[0]?.elements?.length === 1),
        check('project parse works', parsed?.slides?.[0]?.id === 's1'),
        check('full snapshot omits text placeholders', !fullPlaceholderSnapshot.textContent.includes('Введіть заголовок')),
        check('full snapshot omits shape placeholders', !fullPlaceholderSnapshot.textContent.includes('Текст фігури')),
        check('thumbnail keeps editor placeholders', thumbPlaceholderSnapshot.textContent.includes('Введіть заголовок') && thumbPlaceholderSnapshot.textContent.includes('Текст фігури')),
        check('thumbnail marks placeholders visually', thumbPlaceholderSnapshot.querySelectorAll('.is-placeholder').length === 2),
        check('slugify handles ukrainian', slugify('Моя презентація 1') === 'моя-презентація-1'),
        check('elementBounds axis-aligned for rotation 0', (() => {
          const b = elementBounds({ x: 100, y: 100, w: 240, h: 160, rotation: 0 });
          return b.left === 100 && b.right === 340 && b.top === 100 && b.bottom === 260;
        })()),
        check('elementBounds rotation-aware (90deg AABB)', (() => {
          const b = elementBounds({ x: 100, y: 100, w: 240, h: 160, rotation: 90 });
          return Math.abs(b.left - 140) < 0.001 && Math.abs(b.right - 300) < 0.001 && Math.abs(b.top - 60) < 0.001 && Math.abs(b.bottom - 300) < 0.001;
        })()),
        check('IndexedDB draft round-trips', idbRoundTrips),
        check('clear-draft removes the draft', clearDraftWorks),
        check('large image draft (data-url) round-trips', imageDraftRoundTrips),
        check('quota failure propagates without breaking the editor', quotaFailurePropagates),
        check('draft storage recovers after quota failure', storageRecoversAfterFailure),
        check('wrapped draft record loads', wrappedDraftLoads),
        check('legacy unwrapped draft still loads', legacyDraftLoads),
        check('clear-draft leaves a tombstone (no resurrection)', clearWritesTombstone),
        check('equal-timestamp tombstone wins over stale IDB draft', equalTimestampTombstoneWins)
      ];

      // Негативні/безпекові перевірки нормалізації імпорту (P0): ліміти, нейтралізація
      // зовнішніх URL, кламбінг координат, відмова на пошкодженому/надмірному файлі.
      const slidesOf = els => ({ slides: [{ id: 's', background: '#fff', elements: els }] });
      const firstEl = data => normalizePresentation(data).slides[0].elements[0];
      checks.push(check('import rejects non-object', normalizePresentation(null) === null && normalizePresentation(7) === null));
      checks.push(check('import rejects empty slides', normalizePresentation({ slides: [] }) === null));
      checks.push(check('import rejects too many slides', normalizePresentation({ slides: Array.from({ length: LIMITS.MAX_SLIDES + 1 }, (_, i) => ({ id: 's' + i, elements: [] })) }) === null));
      checks.push(check('import rejects too many elements', normalizePresentation(slidesOf(Array.from({ length: LIMITS.MAX_ELEMENTS_PER_SLIDE + 1 }, () => ({ type: 'text', content: 'a' })))) === null));
      checks.push(check('import neutralizes external image url', firstEl(slidesOf([{ type: 'image', content: 'https://evil.example/x.png' }])).content === ''));
      checks.push(check('import keeps data image url', firstEl(slidesOf([{ type: 'image', content: 'data:image/png;base64,AAAA' }])).content === 'data:image/png;base64,AAAA'));
      checks.push(check('import preserves image alt text', firstEl(slidesOf([{ type: 'image', content: 'data:image/png;base64,AAAA', alt: 'Кругообіг води' }])).alt === 'Кругообіг води'));
      checks.push(check('import keeps valid image fit', firstEl(slidesOf([{ type: 'image', content: 'data:image/png;base64,AAAA', style: { objectFit: 'contain' } }])).style.objectFit === 'contain'));
      checks.push(check('import allowlists unknown image fit', firstEl(slidesOf([{ type: 'image', content: 'data:image/png;base64,AAAA', style: { objectFit: 'fill' } }])).style.objectFit === 'cover'));
      checks.push(check('import keeps fractional image opacity', firstEl(slidesOf([{ type: 'image', content: 'data:image/png;base64,AAAA', style: { opacity: 0.4 } }])).style.opacity === 0.4));
      checks.push(check('import clamps out-of-range image opacity', firstEl(slidesOf([{ type: 'image', content: 'data:image/png;base64,AAAA', style: { opacity: 5 } }])).style.opacity === 1));
      checks.push(check('import keeps valid crop fractions', (() => { const c = firstEl(slidesOf([{ type: 'image', content: 'data:image/png;base64,AAAA', crop: { l: 0.2, t: 0.1, r: 0.3, b: 0.1 } }])).crop; return c.l === 0.2 && c.r === 0.3 && c.t === 0.1 && c.b === 0.1; })()));
      checks.push(check('import clamps crop opposite sum', (() => { const c = firstEl(slidesOf([{ type: 'image', content: 'data:image/png;base64,AAAA', crop: { l: 0.8, r: 0.8 } }])).crop; return c.l === 0.8 && (c.l + c.r) <= 0.9; })()));
      checks.push(check('import resets invalid crop values', (() => { const c = firstEl(slidesOf([{ type: 'image', content: 'data:image/png;base64,AAAA', crop: { l: 'x', t: -1 } }])).crop; return c.l === 0 && c.t === 0; })()));
      checks.push(check('non-image element has null crop', firstEl(slidesOf([{ type: 'text', content: 'a' }])).crop === null));
      checks.push(check('import keeps valid font family', firstEl(slidesOf([{ type: 'text', content: 'a', style: { fontFamily: 'serif' } }])).style.fontFamily === 'serif'));
      checks.push(check('import allowlists unknown font family', firstEl(slidesOf([{ type: 'text', content: 'a', style: { fontFamily: 'evil-font' } }])).style.fontFamily === 'sans'));
      checks.push(check('import keeps arbitrary in-range line height', firstEl(slidesOf([{ type: 'text', content: 'a', style: { lineHeight: 1.2 } }])).style.lineHeight === 1.2));
      checks.push(check('import keeps line height upper bound', firstEl(slidesOf([{ type: 'text', content: 'a', style: { lineHeight: 3 } }])).style.lineHeight === 3));
      checks.push(check('import clamps out-of-range line height', firstEl(slidesOf([{ type: 'text', content: 'a', style: { lineHeight: 9 } }])).style.lineHeight === 3));
      checks.push(check('import resets non-numeric line height', firstEl(slidesOf([{ type: 'text', content: 'a', style: { lineHeight: 'big' } }])).style.lineHeight === 1.15));
      checks.push(check('import keeps valid list type', firstEl(slidesOf([{ type: 'text', content: 'a', style: { listType: 'bullet' } }])).style.listType === 'bullet'));
      checks.push(check('import allowlists unknown list type', firstEl(slidesOf([{ type: 'text', content: 'a', style: { listType: 'script' } }])).style.listType === 'none'));
      checks.push(check('trusted import keeps external image url', normalizePresentation(slidesOf([{ type: 'image', content: 'https://ok.example/x.png' }]), { trusted: true }).slides[0].elements[0].content === 'https://ok.example/x.png'));
      checks.push(check('import truncates over-long text', firstEl(slidesOf([{ type: 'text', content: 'x'.repeat(LIMITS.MAX_TEXT_LENGTH + 5000) }])).content.length === LIMITS.MAX_TEXT_LENGTH));
      checks.push(check('import clamps wild coordinates', (() => {
        const el = firstEl(slidesOf([{ type: 'text', content: 'a', x: 1e12, y: -1e12, w: 1e15, h: 5 }]));
        return Number.isFinite(el.x) && Math.abs(el.x) <= LIMITS.MAX_COORD && el.w <= LIMITS.MAX_SIZE;
      })()));
      checks.push(check('corrupted json throws on parse', (() => { try { parsePresentationText('{bad'); return false; } catch { return true; } })()));
      checks.push(check('import accepts current schema version', !!parsePresentationText(JSON.stringify({ schemaVersion: SCHEMA_VERSION, ...project }))));
      checks.push(check('import accepts legacy file without schema version', !!parsePresentationText(JSON.stringify(project))));
      checks.push(check('import rejects unknown future schema version', parsePresentationText(JSON.stringify({ schemaVersion: SCHEMA_VERSION + 1, ...project })) === null));
      checks.push(check('import accepts current text model version', !!parsePresentationText(JSON.stringify({ textModelVersion: TEXT_MODEL_VERSION, ...project }))));
      checks.push(check('import accepts legacy file without text model version', !!parsePresentationText(JSON.stringify(project))));
      checks.push(check('import rejects unknown future text model version', parsePresentationText(JSON.stringify({ textModelVersion: TEXT_MODEL_VERSION + 1, ...project })) === null));
      checks.push(check('import rejects malformed text model version', parsePresentationText(JSON.stringify({ textModelVersion: '2', ...project })) === null));
      checks.push(check('import allowlists text align (selector-injection)', ['left', 'center', 'right'].includes(firstEl(slidesOf([{ type: 'text', content: 'a', style: { align: '"]' } }])).style.align)));
      checks.push(check('import neutralizes css-url background', normalizePresentation({ slides: [{ id: 's', background: 'url(https://evil.example/x.png)', elements: [] }] }).slides[0].background === '#ffffff'));
      checks.push(check('import keeps valid hex background', normalizePresentation({ slides: [{ id: 's', background: '#123456', elements: [] }] }).slides[0].background === '#123456'));
      checks.push(check('import keeps valid theme', normalizePresentation({ theme: 'ocean', slides: [{ id: 's', elements: [] }] }).theme === 'ocean'));
      checks.push(check('import allowlists unknown theme', normalizePresentation({ theme: 'hacker', slides: [{ id: 's', elements: [] }] }).theme === 'classic'));
      checks.push(check('import defaults missing theme to classic', normalizePresentation({ slides: [{ id: 's', elements: [] }] }).theme === 'classic'));
      checks.push(check('import keeps valid layout', normalizePresentation({ slides: [{ id: 's', layout: 'two-content', elements: [] }] }).slides[0].layout === 'two-content'));
      checks.push(check('import allowlists unknown layout', normalizePresentation({ slides: [{ id: 's', layout: 'fancy', elements: [] }] }).slides[0].layout === 'blank'));
      checks.push(check('import keeps valid placeholder type', firstEl(slidesOf([{ type: 'text', content: 'a', placeholderType: 'title' }])).placeholderType === 'title'));
      checks.push(check('import allowlists unknown placeholder type', firstEl(slidesOf([{ type: 'text', content: 'a', placeholderType: 'evil' }])).placeholderType === null));
      checks.push(check('import rejects image placeholder type on text', firstEl(slidesOf([{ type: 'text', content: 'a', placeholderType: 'image' }])).placeholderType === null));
      checks.push(check('import rejects text placeholder type on image', firstEl(slidesOf([{ type: 'image', content: 'data:image/png;base64,AAAA', placeholderType: 'title' }])).placeholderType === null));
      checks.push(check('import keeps image placeholder type on image', firstEl(slidesOf([{ type: 'image', content: '', isPlaceholder: true, placeholderType: 'image' }])).placeholderType === 'image'));
      checks.push(check('import honors image placeholder flag', firstEl(slidesOf([{ type: 'image', content: '', isPlaceholder: true, placeholderType: 'image' }])).isPlaceholder === true));
      checks.push(check('import neutralizes css-url shape fill', firstEl(slidesOf([{ type: 'shape', shape: 'rect', style: { fill: 'url(https://evil.example/x.png)' } }])).style.fill !== 'url(https://evil.example/x.png)'));
      checks.push(check('import keeps line and arrow shapes', (() => {
        const n = normalizePresentation(slidesOf([{ type: 'shape', shape: 'line' }, { type: 'shape', shape: 'arrow' }]));
        return n.slides[0].elements[0].shape === 'line' && n.slides[0].elements[1].shape === 'arrow';
      })()));
      checks.push(check('import allowlists unknown shape', firstEl(slidesOf([{ type: 'shape', shape: 'script' }])).shape === 'rect'));
      checks.push(check('import keeps text in filled shape', firstEl(slidesOf([{ type: 'shape', shape: 'rect', content: 'Shape text' }])).content === 'Shape text'));
      checks.push(check('import strips text from line shape', firstEl(slidesOf([{ type: 'shape', shape: 'line', content: 'Hidden text' }])).content === ''));
      checks.push(check('import handles null slide entries without throwing', (() => {
        const n = normalizePresentation({ slides: [null, { id: 'ok', elements: [] }] });
        return !!n && n.slides.length === 2 && typeof n.slides[0].id === 'string';
      })()));
      checks.push(check('import rejects too many total elements', normalizePresentation({ slides: Array.from({ length: 60 }, (_, i) => ({ id: 's' + i, elements: Array.from({ length: 90 }, () => ({ type: 'text', content: 'a' })) })) }) === null));
      checks.push(check('import makes duplicate slide ids unique', (() => {
        const n = normalizePresentation({ slides: [{ id: 'dup', elements: [] }, { id: 'dup', elements: [] }] });
        return n.slides[0].id !== n.slides[1].id;
      })()));
      checks.push(check('import makes duplicate element ids unique', (() => {
        const n = normalizePresentation(slidesOf([{ type: 'text', id: 'e', content: 'a' }, { type: 'text', id: 'e', content: 'b' }]));
        return n.slides[0].elements[0].id !== n.slides[0].elements[1].id;
      })()));
      checks.push(check('import dedupes element ids across slides', (() => {
        const n = normalizePresentation({ slides: [{ id: 's1', elements: [{ type: 'text', id: 'e', content: 'a' }] }, { id: 's2', elements: [{ type: 'text', id: 'e', content: 'b' }] }] });
        return n.slides[0].elements[0].id !== n.slides[1].elements[0].id;
      })()));
      checks.push(check('import resolves currentSlideId after dedupe', (() => {
        const n = normalizePresentation({ slides: [{ id: 'dup', elements: [] }, { id: 'dup', elements: [] }], currentSlideId: 'dup' });
        return n.currentSlideId === n.slides[0].id && n.slides.some(s => s.id === n.currentSlideId);
      })()));
      checks.push(check('import resolves truncation-collision ids uniquely', (() => {
        const longA = 'x'.repeat(70) + 'A';
        const longB = 'x'.repeat(70) + 'B';
        const n = normalizePresentation(slidesOf([{ type: 'text', id: longA, content: 'a' }, { type: 'text', id: longB, content: 'b' }]));
        return n.slides[0].elements[0].id !== n.slides[0].elements[1].id;
      })()));

      // Сценарій історії: фігура -> новий слайд -> один Undo має прибрати лише
      // слайд і зберегти раніше додану фігуру (регресія off-by-one в undo).
      const countShapes = () => doc.querySelectorAll('#stage .shape-element').length;
      const countSlides = () => doc.querySelectorAll('#slideList .slide-card').length;
      const clickAction = action => {
        const buttons = Array.from(doc.querySelectorAll(`[data-action="${action}"]`));
        const button = buttons.find(node => !node.closest('.menu-dropdown')) || buttons[0];
        if (!button) throw new Error(`action button missing: ${action}`);
        button.click();
      };

      const shapesBefore = countShapes();
      const slidesBefore = countSlides();

      clickAction('insert-rect');
      await waitFor(() => countShapes() === shapesBefore + 1, 'shape inserted');

      clickAction('new-slide');
      await waitFor(() => countSlides() === slidesBefore + 1, 'slide added');

      clickAction('undo');
      await waitFor(() => countSlides() === slidesBefore, 'undo removes the new slide');

      checks.push(check('undo removes only the new slide', countSlides() === slidesBefore));
      checks.push(check('undo keeps the earlier shape', countShapes() === shapesBefore + 1));

      clickAction('redo');
      await waitFor(() => countSlides() === slidesBefore + 1, 'redo restores the new slide');
      checks.push(check('redo restores the new slide', countSlides() === slidesBefore + 1));

      // Лінії та стрілки користуються спільною моделлю shape й однаково рендеряться
      // на сцені та у мініатюрі. Вставка стрілки також є окремим кроком Undo/Redo.
      const shapesBeforeLines = countShapes();
      clickAction('insert-line');
      clickAction('insert-arrow');
      await waitFor(() => countShapes() === shapesBeforeLines + 2, 'line and arrow inserted');
      checks.push(check('line renders as SVG line', !!doc.querySelector('#stage .shape-element [data-shape-kind="line"]')));
      checks.push(check('arrow renders with an arrowhead', !!doc.querySelector('#stage .shape-element path[data-shape-kind="arrow"]')));
      checks.push(check('arrow renders in slide thumbnail', !!doc.querySelector('#slideList .slide-card.active .slide-thumb-mini path[data-shape-kind="arrow"]')));

      checks.push(check('crop participates in Undo', imgWrapNow().querySelector('.crop-window').style.width === '100%'));

      // Зміна слайда має завершувати режим кадрування (не «воскресати» при поверненні).
      imgWrapNow().dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 81, clientX: cropToX(470), clientY: cropToY(270) }));
      cropStage.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 81, clientX: cropToX(470), clientY: cropToY(270) }));
      clickAction('image-crop');
      await waitFor(() => imgWrapNow().querySelector('.crop-handle'), 'crop re-entered for slide-change test');
      const imageSlideId = doc.querySelector('#slideList .slide-card.active').dataset.slideId;
      clickAction('new-slide');
      await wait(20);
      Array.from(doc.querySelectorAll('#slideList .slide-card'))
        .find(card => card.dataset.slideId === imageSlideId)
        .querySelector('.slide-thumb-button')
        .click();
      await waitFor(() => doc.querySelector('#stage .image-element'), 'returned to image slide');
      checks.push(check('slide change exits crop mode', !imgWrapNow().querySelector('.crop-handle')));
      checks.push(check('crop button inactive after slide change', !doc.querySelector('[data-action="image-crop"]').classList.contains('active')));

      // pointercancel завершує crop-drag: подальший рух не змінює кадрування.
      imgWrapNow().dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 82, clientX: cropToX(470), clientY: cropToY(270) }));
      cropStage.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 82, clientX: cropToX(470), clientY: cropToY(270) }));
      clickAction('image-crop');
      await waitFor(() => imgWrapNow().querySelector('.crop-handle'), 'crop re-entered for cancel test');
      const cancelWrap = imgWrapNow();
      const cancelE = cancelWrap.querySelector('.crop-handle.e');
      cancelE.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 83, clientX: cropToX(680), clientY: cropToY(270) }));
      cropStage.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 83, clientX: cropToX(620), clientY: cropToY(270) }));
      await waitFor(() => parseFloat(cancelWrap.querySelector('.crop-window').style.width) < 99, 'crop drag started before cancel');
      cropStage.dispatchEvent(new win.PointerEvent('pointercancel', { bubbles: true, pointerId: 83, clientX: cropToX(620), clientY: cropToY(270) }));
      const widthAfterCancel = parseFloat(cancelWrap.querySelector('.crop-window').style.width);
      // Рух ПІСЛЯ скасування не повинен далі змінювати кадрування.
      cropStage.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 83, clientX: cropToX(520), clientY: cropToY(270) }));
      await wait(60);
      checks.push(check('pointercancel stops crop drag', parseFloat(cancelWrap.querySelector('.crop-window').style.width) === widthAfterCancel));
      doc.dispatchEvent(new win.KeyboardEvent('keydown', { key: 'Escape', bubbles: true }));
      await waitFor(() => !imgWrapNow().querySelector('.crop-handle'), 'exit crop after cancel test');

      // === Хвиля 4.1: теми оформлення (фон усіх слайдів + акцентна палітра) ===
      const themeStage = doc.querySelector('#stage');
      const swatchTitle = () => doc.querySelector('#colorPalette .color-swatch')?.title;
      const bgBeforeTheme = win.getComputedStyle(themeStage).backgroundColor;
      const swatchBeforeTheme = swatchTitle();
      clickAction('show-themes');
      await waitFor(() => doc.querySelector('#modalBody .theme-card'), 'theme picker opens');
      checks.push(check('theme picker lists multiple themes', doc.querySelectorAll('#modalBody .theme-card').length >= 4));
      checks.push(check('classic theme is active by default', !!doc.querySelector('#modalBody .theme-card.active[data-theme="classic"]')));
      doc.querySelector('#modalBody .theme-card[data-theme="ocean"]').click();
      await waitFor(() => doc.querySelector('#modalOverlay').classList.contains('hidden'), 'theme picker closes on pick');
      await waitFor(() => win.getComputedStyle(themeStage).backgroundColor === 'rgb(239, 246, 255)', 'theme updates slide background');
      checks.push(check('theme updates slide background', win.getComputedStyle(themeStage).backgroundColor === 'rgb(239, 246, 255)'));
      checks.push(check('theme switches accent palette', swatchTitle() === '#0F172A'));
      clickAction('new-slide');
      await waitFor(() => win.getComputedStyle(themeStage).backgroundColor === 'rgb(239, 246, 255)', 'new slide inherits active theme');
      checks.push(check('new slide inherits active theme background', win.getComputedStyle(themeStage).backgroundColor === 'rgb(239, 246, 255)'));
      clickAction('template-title');
      await waitFor(() => doc.querySelector('#stage .shape-element'), 'legacy template applied under active theme');
      checks.push(check('legacy template keeps active theme background', win.getComputedStyle(themeStage).backgroundColor === 'rgb(239, 246, 255)'));
      clickAction('show-layouts');
      await waitFor(() => doc.querySelector('.layout-card'), 'layout picker opens after template');
      checks.push(check('destructive template resets stale layout metadata', !!doc.querySelector('.layout-card.active[data-layout="blank"]')));
      doc.querySelector('#modalConfirm').click();
      await waitFor(() => doc.querySelector('#modalOverlay').classList.contains('hidden'), 'layout picker closes after template check');
      clickAction('undo');
      clickAction('undo');
      clickAction('undo');
      await waitFor(() => win.getComputedStyle(themeStage).backgroundColor === bgBeforeTheme, 'undo restores theme background');
      checks.push(check('theme change participates in Undo', win.getComputedStyle(themeStage).backgroundColor === bgBeforeTheme && swatchTitle() === swatchBeforeTheme));

      // === Хвиля 4.2: макети слайдів + типізовані placeholder-и ===
      clickAction('new-slide');
      await wait(60);
      clickAction('show-layouts');
      await waitFor(() => doc.querySelector('.layout-card'), 'layout picker opens');
      checks.push(check('layout picker lists layouts', doc.querySelectorAll('.layout-card').length >= 4));
      doc.querySelector('.layout-card[data-layout="title-image"]').click();
      await waitFor(() => doc.querySelector('#stage .image-placeholder'), 'title-image layout adds image placeholder');
      checks.push(check('layout adds typed image placeholder', !!doc.querySelector('#stage .image-placeholder')));
      checks.push(check('layout adds text title placeholder', !!doc.querySelector('#stage .stage-element .text-element')));
      checks.push(check('title-image layout has exactly two slots', doc.querySelectorAll('#stage .stage-element').length === 2));
      clickAction('undo');
      await waitFor(() => !doc.querySelector('#stage .image-placeholder'), 'undo reverts layout');
      checks.push(check('layout apply participates in Undo', !doc.querySelector('#stage .image-placeholder')));
      clickAction('redo');
      await waitFor(() => doc.querySelector('#stage .image-placeholder'), 'redo reapplies layout');
      // Порожній image-placeholder НЕ показує image-тулбар (fit/opacity/crop недоречні).
      const phWrap = doc.querySelector('#stage .image-placeholder').closest('.stage-element');
      const phr = phWrap.getBoundingClientRect();
      phWrap.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 130, clientX: phr.left + 5, clientY: phr.top + 5 }));
      doc.querySelector('#stage').dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 130, clientX: phr.left + 5, clientY: phr.top + 5 }));
      await wait(30);
      checks.push(check('empty image placeholder hides image toolbar', doc.querySelector('#imageToolGroup').classList.contains('hidden')));
      // Заповнення image-placeholder подвійним кліком → реальне зображення (isPlaceholder знято).
      doc.querySelector('#stage .image-placeholder').dispatchEvent(new win.MouseEvent('dblclick', { bubbles: true }));
      await waitFor(() => doc.querySelector('#modalTitle')?.textContent === 'Замінити зображення', 'image placeholder opens fill dialog');
      doc.querySelector('#imageUrlField').value = 'data:image/png;base64,QQ==';
      doc.querySelector('#modalConfirm').click();
      await waitFor(() => doc.querySelector('#stage .image-element'), 'image placeholder filled with real image');
      checks.push(check('filling image placeholder yields a real image', !!doc.querySelector('#stage .image-element') && !doc.querySelector('#stage .image-placeholder')));
      await waitFor(() => !doc.querySelector('#imageToolGroup').classList.contains('hidden'), 'filled image shows image toolbar');
      checks.push(check('filled image shows image toolbar', !doc.querySelector('#imageToolGroup').classList.contains('hidden')));

      // [P1] Застосування макета зберігає реальні фігури (лише порожні типізовані
      // placeholder-и прибираються).
      clickAction('new-slide');
      await wait(60);
      clickAction('insert-rect');
      await waitFor(() => doc.querySelector('#stage .shape-element'), 'real shape inserted before layout');
      const shapesBeforeLayout = doc.querySelectorAll('#stage .shape-element').length;
      clickAction('show-layouts');
      await waitFor(() => doc.querySelector('.layout-card'), 'layout picker reopens');
      doc.querySelector('.layout-card[data-layout="title-body"]').click();
      await waitFor(() => doc.querySelector('#stage .text-element'), 'layout applied over real shape');
      checks.push(check('applying layout keeps real shapes', doc.querySelectorAll('#stage .shape-element').length === shapesBeforeLayout));

      // === №6: вирівнювання та розподіл об'єктів ===
      clickAction('new-slide');
      await wait(60);
      const alStage = doc.querySelector('#stage');
      const alSr = alStage.getBoundingClientRect();
      const alSelWrap = () => alStage.querySelector('.stage-element.selected');
      const shapeWraps = () => Array.from(alStage.querySelectorAll('.stage-element')).filter(w => w.querySelector('.shape-element'));
      const cxOf = w => parseFloat(w.style.left) + parseFloat(w.style.width) / 2;
      const dragSelTo = (lx, ly) => {
        const w = alSelWrap();
        const r = w.getBoundingClientRect();
        const toX = alSr.left + lx * (alSr.width / 960);
        const toY = alSr.top + ly * (alSr.height / 540);
        w.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 95, clientX: r.left + r.width / 2, clientY: r.top + r.height / 2 }));
        alStage.dispatchEvent(new win.PointerEvent('pointermove', { bubbles: true, pointerId: 95, clientX: toX, clientY: toY }));
        alStage.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 95, clientX: toX, clientY: toY }));
      };
      clickAction('insert-rect'); await waitFor(() => shapeWraps().length === 1, 'align rect 1'); dragSelTo(170, 300);
      clickAction('insert-rect'); await waitFor(() => shapeWraps().length === 2, 'align rect 2'); dragSelTo(450, 160);
      clickAction('insert-rect'); await waitFor(() => shapeWraps().length === 3, 'align rect 3'); dragSelTo(780, 420);
      // Вибираємо лише 3 фігури (не placeholder-и слайда).
      const sw = shapeWraps();
      sw[0].dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: 96, clientX: sw[0].getBoundingClientRect().left + 5, clientY: sw[0].getBoundingClientRect().top + 5 }));
      alStage.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: 96 }));
      sw[1].dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, shiftKey: true, pointerId: 97 }));
      sw[2].dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, shiftKey: true, pointerId: 98 }));
      await waitFor(() => alStage.querySelectorAll('.stage-element.selected').length === 3, 'three shapes selected');
      checks.push(check('align toolbar shows for multi-select', !doc.querySelector('#alignToolGroup').classList.contains('hidden')));
      // Розподіл по горизонталі: центр середньої фігури — рівно між крайніми.
      clickAction('distribute-h');
      await wait(40);
      const byCx = shapeWraps().slice().sort((a, b) => cxOf(a) - cxOf(b));
      const expectedMid = (cxOf(byCx[0]) + cxOf(byCx[2])) / 2;
      checks.push(check('distribute centers the middle object', Math.abs(cxOf(byCx[1]) - expectedMid) < 1));
      // Вирівнювання догори: усі верхні краї збігаються.
      clickAction('align-objects-top');
      await wait(40);
      const tops = shapeWraps().map(w => parseFloat(w.style.top));
      checks.push(check('align top makes top edges equal', Math.max(...tops) - Math.min(...tops) < 1));
      // Undo повертає попередні top-и (різні).
      clickAction('undo');
      await wait(40);
      const topsAfterUndo = shapeWraps().map(w => parseFloat(w.style.top));
      checks.push(check('align participates in Undo', Math.max(...topsAfterUndo) - Math.min(...topsAfterUndo) > 1));

      // === №6: групування / розгрупування (липкий вибір групи) ===
      clickAction('new-slide');
      await wait(60);
      const grStage = doc.querySelector('#stage');
      const grShapes = () => Array.from(grStage.querySelectorAll('.stage-element')).filter(w => w.querySelector('.shape-element'));
      const selCount = () => grStage.querySelectorAll('.stage-element.selected').length;
      const clickWrap = (w, extra = {}, pid = 110) => {
        const r = w.getBoundingClientRect();
        w.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: pid, clientX: r.left + 5, clientY: r.top + 5, ...extra }));
        if (!extra.shiftKey) grStage.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: pid, clientX: r.left + 5, clientY: r.top + 5 }));
      };
      const deselect = (pid = 120) => {
        const sr = grStage.getBoundingClientRect();
        grStage.dispatchEvent(new win.PointerEvent('pointerdown', { bubbles: true, pointerId: pid, clientX: sr.left + 2, clientY: sr.top + 2 }));
        grStage.dispatchEvent(new win.PointerEvent('pointerup', { bubbles: true, pointerId: pid, clientX: sr.left + 2, clientY: sr.top + 2 }));
      };
      clickAction('insert-rect'); await waitFor(() => grShapes().length === 1, 'group rect 1');
      clickAction('insert-rect'); await waitFor(() => grShapes().length === 2, 'group rect 2');
      let gs = grShapes();
      clickWrap(gs[0], {}, 110);
      clickWrap(gs[1], { shiftKey: true }, 111);
      await waitFor(() => selCount() === 2, 'two rects selected to group');
      clickAction('group-objects');
      await wait(30);
      // Клік по одному члену групи вибирає всю групу.
      deselect(120);
      await waitFor(() => selCount() === 0, 'deselected after grouping');
      clickWrap(grShapes()[0], {}, 112);
      await waitFor(() => selCount() === 2, 'group member click selects whole group');
      checks.push(check('clicking a group member selects the whole group', selCount() === 2));
      checks.push(check('single selected group keeps ungroup command available', !doc.querySelector('#alignToolGroup').classList.contains('hidden') && !doc.querySelector('[data-action="ungroup-objects"]').disabled));
      checks.push(check('single selected group disables no-op align and distribute', doc.querySelector('[data-action="align-objects-left"]').disabled && doc.querySelector('[data-action="distribute-h"]').disabled));
      // Дублювання групи створює ОКРЕМУ групу (не зливається з оригіналом).
      clickAction('duplicate-element');
      await waitFor(() => grShapes().length === 4, 'group duplicated');
      deselect(121);
      await waitFor(() => selCount() === 0, 'deselected after duplicate');
      clickWrap(grShapes()[0], {}, 113);
      await waitFor(() => selCount() === 2, 'duplicated groups stay separate');
      checks.push(check('duplicating a group creates a separate group', selCount() === 2 && grShapes().length === 4));
      // Розгрупування — члени знову вибираються поодинці.
      clickAction('ungroup-objects');
      await wait(30);
      deselect(122);
      await waitFor(() => selCount() === 0, 'deselected after ungroup');
      clickWrap(grShapes()[0], {}, 114);
      await waitFor(() => selCount() === 1, 'ungrouped member selects alone');
      checks.push(check('ungroup makes members select individually', selCount() === 1));

      // [P1] Вирівнювання групи як ОДНІЄЇ одиниці — внутрішнє розташування зберігається.
      clickAction('new-slide');
      await wait(60);
      clickAction('insert-rect'); await waitFor(() => shapeWraps().length === 1, 'unit rect A'); dragSelTo(220, 150);
      clickAction('insert-rect'); await waitFor(() => shapeWraps().length === 2, 'unit rect B'); dragSelTo(330, 330);
      const ab = shapeWraps();
      clickWrap(ab[0], {}, 140);
      clickWrap(ab[1], { shiftKey: true }, 141);
      await waitFor(() => selCount() === 2, 'unit A+B selected to group');
      clickAction('group-objects');
      await wait(30);
      clickAction('insert-rect'); await waitFor(() => shapeWraps().length === 3, 'unit rect C'); dragSelTo(760, 150);
      const s3 = shapeWraps();
      clickWrap(s3[0], {}, 142);
      clickWrap(s3[2], { shiftKey: true }, 143);
      await waitFor(() => selCount() === 3, 'unit group + C selected');
      const leftOf = w => parseFloat(w.style.left);
      const pre = shapeWraps();
      const offBefore = leftOf(pre[1]) - leftOf(pre[0]);
      clickAction('align-objects-left');
      await wait(40);
      const post = shapeWraps();
      const offAfter = leftOf(post[1]) - leftOf(post[0]);
      checks.push(check('aligning a group preserves its internal layout', Math.abs(offBefore) > 5 && Math.abs(offAfter - offBefore) < 1));
      checks.push(check('alignment treats a group as one unit', Math.abs(leftOf(post[2]) - Math.min(leftOf(post[0]), leftOf(post[1]))) < 1));

      // Restore-after-reload: збережена чернетка має відновитися на старті
      // (hydration). Зберігаємо маркерну чернетку й перезавантажуємо редактор.
      // Чекаємо завершення останнього debounce з активного iframe, щоб він не
      // перезаписав маркерну чернетку вже після її збереження.
      clickAction('insert-rect');
      clickAction('new-project');
      doc.querySelector('#modalConfirm').click();
      await wait(600);
      checks.push(check('new project cancels pending autosave before clearing draft', await loadDraft() === null));
      await clearDraft();
      const draftMarker = 'Чернетка-' + Date.now();
      await saveDraft({ schemaVersion: 1, fileName: draftMarker, slides: [{ id: 's1', background: '#ffffff', elements: [{ type: 'text', content: 'Текст', x: 100, y: 100, w: 200, h: 80 }] }], currentSlideId: 's1' });
      await loadFrame('../slides/index.html?reload=1');
      const reloadedDoc = frame.contentDocument;
      const reloadedWin = frame.contentWindow;
      await waitFor(() => typeof reloadedWin.SlidesApp?.boot === 'function', 'reloaded boot');
      await waitFor(() => reloadedDoc.querySelector('#fileName')?.textContent === draftMarker, 'draft restored after reload', 6000);
      checks.push(check('draft restores after reload (hydration)', reloadedDoc.querySelector('#fileName')?.textContent === draftMarker));

      result.className = 'pass';
      result.textContent = checks.join('\n') + '\n\nPASSED';
      document.body.dataset.slidesBehavior = 'passed';
    }

    // Guard: чернетка (IndexedDB) спільна для tests/ і slides/. Зберігаємо
    // реальну чернетку користувача ДО тесту і ВІДНОВЛЮЄМО її у finally, тож
    // запуск тесту (навіть у живому профілі) не знищує збережену презентацію.
    async function runGuarded() {
      let savedDraft = null;
      try { savedDraft = await loadDraft(); } catch {}
      try {
        try { await clearDraft(); } catch {}
        await run();
      } finally {
        await wait(350); // дочекатися останнього autosave перед відновленням
        try {
          if (savedDraft) await saveDraft(savedDraft);
          else await clearDraft();
        } catch {}
      }
    }

    runGuarded().catch(error => {
      result.className = 'fail';
      result.textContent = String(error && error.stack || error);
      document.body.dataset.slidesBehavior = 'failed';
    });
  </script>
</body>
</html>
