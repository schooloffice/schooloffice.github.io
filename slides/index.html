<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ПЛЮС Слайди — редактор презентацій</title>
  <meta name="description" content="ПЛЮС Слайди — простий редактор презентацій для шкільного офісного пакета.">
<link rel="stylesheet" href="../vendor/fontawesome/css/all.min.css">
  <script src="../vendor/html2pdf/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="../UI_TOKENS.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../shell-overrides.css">
</head>

<body class="office-app" data-office-service="slides">
  <noscript>
    <p class="noscript-warning">Увімкніть JavaScript для роботи редактора.</p>
  </noscript>

  <input id="projectFileInput" type="file" accept=".json,.artslides,.artslides.json,application/json" hidden>
  <input id="imageFileInput" type="file" accept="image/*" hidden>

  <div id="modalOverlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalText">
      <div class="modal-head">
        <div id="modalIcon" class="modal-icon"><i class="fa-solid fa-circle-info"></i></div>
        <div>
          <div id="modalTitle" class="modal-title">Повідомлення</div>
          <div id="modalText" class="modal-text"></div>
        </div>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-actions">
        <button id="modalCancel" class="modal-btn secondary hidden">Скасувати</button>
        <button id="modalConfirm" class="modal-btn primary">Гаразд</button>
      </div>
    </div>
  </div>

  <div id="presentOverlay" class="present-overlay hidden" aria-hidden="true">
    <div class="present-stage-wrap" id="presentStageWrap"></div>
    <button id="presentPrev" class="present-nav left" title="Попередній слайд" aria-label="Попередній слайд">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <button id="presentNext" class="present-nav right" title="Наступний слайд" aria-label="Наступний слайд">
      <i class="fa-solid fa-chevron-right"></i>
    </button>
    <button id="presentClose" class="present-close" title="Закрити показ" aria-label="Закрити показ">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <div id="presentHint" class="present-hint">← → або пробіл — перемикати слайди • Esc — вихід</div>
  </div>

  <header class="app-header office-header">
    <div class="header-left">
      <a href="../" class="back-link" aria-label="Повернутися до Офіс ПЛЮС" title="Офіс ПЛЮС">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <div class="app-logo"><i class="fa-solid fa-person-chalkboard"></i> ПЛЮС Слайди</div>
      <div class="file-name-wrap">
        <span id="dirtyDot" aria-hidden="true" title="Є незбережені зміни"></span>
        <span id="fileName" role="button" tabindex="0" title="Перейменувати презентацію">моя презентація</span>
      </div>
    </div>
    <div class="header-right">
      <span id="saveBadge">Збережено ✓</span>
    </div>
  </header>

  <nav class="menubar office-menubar" aria-label="Головне меню">
    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="file" aria-haspopup="true" aria-expanded="false">Файл</button>
      <div class="menu-dropdown" data-menu="file" role="menu">
        <button class="menu-item" data-action="new-project"><span><i class="fa-solid fa-file-circle-plus fa-fw"></i>
            Нова презентація</span><span class="shortcut">Ctrl+N</span></button>
        <button class="menu-item" data-action="open-project"><span><i class="fa-solid fa-folder-open fa-fw"></i>
            Відкрити…</span><span class="shortcut">Ctrl+O</span></button>
        <button class="menu-item" data-action="save-project"><span><i class="fa-solid fa-floppy-disk fa-fw"></i>
            Зберегти файл…</span><span class="shortcut">Ctrl+S</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="export-pdf"><span><i class="fa-solid fa-file-pdf fa-fw"></i> Експорт у
            PDF</span></button>
        <button class="menu-item" data-action="print"><span><i class="fa-solid fa-print fa-fw"></i> Друк</span><span
            class="shortcut">Ctrl+P</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="edit" aria-haspopup="true" aria-expanded="false">Редагування</button>
      <div class="menu-dropdown" data-menu="edit" role="menu">
        <button class="menu-item" data-action="undo"><span><i class="fa-solid fa-rotate-left fa-fw"></i>
            Скасувати</span><span class="shortcut">Ctrl+Z</span></button>
        <button class="menu-item" data-action="redo"><span><i class="fa-solid fa-rotate-right fa-fw"></i>
            Повернути</span><span class="shortcut">Ctrl+Y</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="copy"><span><i class="fa-regular fa-copy fa-fw"></i> Копіювати
            об’єкт</span><span class="shortcut">Ctrl+C</span></button>
        <button class="menu-item" data-action="paste"><span><i class="fa-solid fa-paste fa-fw"></i> Вставити
            об’єкт</span><span class="shortcut">Ctrl+V</span></button>
        <button class="menu-item" data-action="duplicate-element"><span><i class="fa-regular fa-clone fa-fw"></i>
            Дублювати об’єкт</span><span class="shortcut">Ctrl+D</span></button>
        <button class="menu-item" data-action="delete-element"><span><i class="fa-solid fa-trash fa-fw"></i> Видалити
            об’єкт</span><span class="shortcut">Delete</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="rotate-left"><span><i class="fa-solid fa-rotate-left fa-fw"></i>
            Повернути ліворуч</span></button>
        <button class="menu-item" data-action="rotate-right"><span><i class="fa-solid fa-rotate-right fa-fw"></i>
            Повернути праворуч</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="insert" aria-haspopup="true" aria-expanded="false">Вставка</button>
      <div class="menu-dropdown" data-menu="insert" role="menu">
        <button class="menu-item" data-action="insert-text"><span><i class="fa-solid fa-font fa-fw"></i> Текстове
            поле</span></button>
        <button class="menu-item" data-action="insert-image"><span><i class="fa-solid fa-image fa-fw"></i>
            Зображення…</span></button>
        <button class="menu-item" data-action="insert-rect"><span><i class="fa-regular fa-square fa-fw"></i>
            Прямокутник</span></button>
        <button class="menu-item" data-action="insert-circle"><span><i class="fa-regular fa-circle fa-fw"></i>
            Коло</span></button>
        <button class="menu-item" data-action="insert-triangle"><span><i
              class="fa-solid fa-play fa-fw fa-rotate-270"></i> Трикутник</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="slide" aria-haspopup="true" aria-expanded="false">Слайд</button>
      <div class="menu-dropdown" data-menu="slide" role="menu">
        <button class="menu-item" data-action="new-slide"><span><i class="fa-solid fa-square-plus fa-fw"></i> Новий
            слайд</span></button>
        <button class="menu-item" data-action="duplicate-slide"><span><i class="fa-regular fa-copy fa-fw"></i> Дублювати
            слайд</span></button>
        <button class="menu-item" data-action="delete-slide"><span><i class="fa-regular fa-trash-can fa-fw"></i>
            Видалити слайд</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="move-slide-up"><span><i class="fa-solid fa-arrow-up fa-fw"></i>
            Перемістити вгору</span></button>
        <button class="menu-item" data-action="move-slide-down"><span><i class="fa-solid fa-arrow-down fa-fw"></i>
            Перемістити вниз</span></button>
        <div class="menu-sep"></div>
        <button class="menu-item" data-action="template-title"><span><i class="fa-solid fa-heading fa-fw"></i> Макет:
            титульний</span></button>
        <button class="menu-item" data-action="template-text-image"><span><i
              class="fa-solid fa-table-columns fa-fw"></i> Макет: текст + фото</span></button>
        <button class="menu-item" data-action="template-three-blocks"><span><i class="fa-solid fa-grip fa-fw"></i>
            Макет: 3 блоки</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="view" aria-haspopup="true" aria-expanded="false">Перегляд</button>
      <div class="menu-dropdown" data-menu="view" role="menu">
        <button class="menu-item" data-action="slide-background"><span><i class="fa-solid fa-fill-drip fa-fw"></i> Фон
            слайда…</span></button>
        <button class="menu-item" data-action="present"><span><i class="fa-solid fa-play fa-fw"></i> Почати
            показ</span><span class="shortcut">F5</span></button>
      </div>
    </div>

    <div class="menu-item-wrap">
      <button class="menu-title" data-menu="help" aria-haspopup="true" aria-expanded="false">Допомога</button>
      <div class="menu-dropdown" data-menu="help" role="menu">
        <button class="menu-item" data-action="shortcuts"><span><i class="fa-solid fa-keyboard fa-fw"></i> Клавіатурні
            скорочення</span></button>
        <button class="menu-item" data-action="about"><span><i class="fa-solid fa-circle-info fa-fw"></i> Про ПЛЮС
            Слайди</span></button>
      </div>
    </div>
  </nav>

  <div class="toolbar office-toolbar" role="toolbar" aria-label="Панель інструментів">
    <div class="tb-group office-toolbar-group">
      <button class="tb-btn" data-action="new-project" data-office-command="new" title="Нова презентація"><i class="fa-solid fa-file-circle-plus"></i></button>
      <button class="tb-btn" data-action="open-project" data-office-command="open" title="Відкрити"><i class="fa-solid fa-folder-open"></i></button>
      <button class="tb-btn" data-action="save-project" data-office-command="save" title="Зберегти"><i class="fa-solid fa-floppy-disk"></i></button>
    </div>

    <div class="tb-sep" aria-hidden="true"></div>

    <div class="tb-group office-toolbar-group">
      <button class="tb-btn" data-action="undo" data-office-command="undo" title="Скасувати"><i class="fa-solid fa-rotate-left"></i></button>
      <button class="tb-btn" data-action="redo" data-office-command="redo" title="Повернути"><i class="fa-solid fa-rotate-right"></i></button>
    </div>

    <div class="tb-sep" aria-hidden="true"></div>

    <div class="tb-group">
      <button class="tb-btn" data-action="insert-text" title="Текстове поле"><i class="fa-solid fa-font"></i></button>
      <button class="tb-btn" data-action="insert-image" title="Зображення"><i class="fa-regular fa-image"></i></button>
      <button class="tb-btn" data-action="insert-rect" title="Прямокутник"><i class="fa-regular fa-square"></i></button>
      <button class="tb-btn" data-action="insert-circle" title="Коло"><i class="fa-regular fa-circle"></i></button>
      <button class="tb-btn" data-action="insert-triangle" title="Трикутник"><i
          class="fa-solid fa-play fa-rotate-270"></i></button>
    </div>

    <div class="tb-sep" aria-hidden="true"></div>

    <div class="tb-group">
      <select id="fontSizeSelect" class="tb-select" aria-label="Розмір тексту">
        <option value="20">20</option>
        <option value="28" selected>28</option>
        <option value="40">40</option>
        <option value="56">56</option>
        <option value="72">72</option>
      </select>
      <button class="tb-btn" data-action="bold" title="Жирний"><i class="fa-solid fa-bold"></i></button>
      <button class="tb-btn" data-action="italic" title="Курсив"><i class="fa-solid fa-italic"></i></button>
      <button class="tb-btn" data-action="underline" title="Підкреслення"><i class="fa-solid fa-underline"></i></button>
      <button class="tb-btn" data-action="align-left" title="Ліворуч"><i class="fa-solid fa-align-left"></i></button>
      <button class="tb-btn" data-action="align-center" title="По центру"><i
          class="fa-solid fa-align-center"></i></button>
      <button class="tb-btn" data-action="align-right" title="Праворуч"><i class="fa-solid fa-align-right"></i></button>
    </div>

    <div class="tb-sep" aria-hidden="true"></div>

    <div class="tb-group">
      <button class="tb-btn" id="colorPanelBtn" data-action="color-panel" title="Кольори"><i
          class="fa-solid fa-palette"></i></button>
      <button class="tb-btn" data-action="rotate-left" title="Повернути ліворуч"><i
          class="fa-solid fa-rotate-left"></i></button>
      <button class="tb-btn" data-action="rotate-right" title="Повернути праворуч"><i
          class="fa-solid fa-rotate-right"></i></button>
    </div>

    <div class="tb-sep" aria-hidden="true"></div>

    <div class="tb-group">
      <button class="tb-btn" data-action="bring-front" title="На передній план"><i
          class="fa-solid fa-layer-group"></i></button>
      <button class="tb-btn" data-action="send-back" title="На задній план"><i
          class="fa-solid fa-layer-group fa-flip-vertical"></i></button>
      <button class="tb-btn" data-action="duplicate-element" title="Дублювати об’єкт"><i
          class="fa-regular fa-clone"></i></button>
      <button class="tb-btn danger" data-action="delete-element" title="Видалити об’єкт"><i
          class="fa-solid fa-trash"></i></button>
    </div>
  </div>

  <main class="app-shell office-workspace">
    <aside class="slides-sidebar" aria-label="Список слайдів">
      <div class="sidebar-head">
        <div>
          <div class="sidebar-title">Слайди</div>
          <div class="sidebar-subtitle">Перетягуй або керуй кнопками на картці</div>
        </div>
      </div>
      <div id="slideList" class="slide-list"></div>
      <div class="sidebar-foot">
        <div class="sidebar-foot-actions">
          <button class="primary-btn" data-action="new-slide"><i class="fa-solid fa-plus"></i> Новий слайд</button>
          <button class="link-button" data-action="show-templates" type="button"><i
              class="fa-solid fa-table-columns"></i> Макети</button>
        </div>
      </div>
    </aside>

    <section class="workspace office-workspace-focusable" id="workspace" tabindex="0">
      <div id="colorPopover" class="color-popover hidden" aria-hidden="true">
        <div class="color-popover-head">
          <div>
            <div class="color-popover-title">Кольори</div>
            <div id="colorPopoverHint" class="color-popover-hint">Виберіть, що саме змінити</div>
          </div>
          <button id="closeColorPopover" class="mini-btn" title="Закрити"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="colorModeButtons" class="color-mode-buttons"></div>
        <div id="colorPalette" class="color-grid"></div>
        <div class="custom-color-row">
          <label class="color-input-wrap">
            <span>Власний колір</span>
            <input id="customColorInput" type="color" value="#2563eb">
          </label>
          <button id="applyCustomColor" class="modal-btn primary small">Застосувати</button>
        </div>
      </div>

      <div class="stage-wrap">
        <div id="stage" class="stage" aria-label="Полотно слайда"></div>
      </div>
    </section>
  </main>

  <footer class="statusbar office-statusbar" aria-label="Рядок стану">
    <span id="statusLeft" data-office-status-slot="primary">Слайд 1 з 1</span>
    <span id="statusRight" data-office-status-slot="secondary">Готово</span>
  </footer>

  <script type="module" src="js/runtime.js"></script>
  <script src="../office-shell.js"></script>
  <script src="../office-ui.js"></script>
  <script src="../offline.js"></script>
</body>

</html>
